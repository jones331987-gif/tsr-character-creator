const STAT_CHAIN = ["d4","d6","d8","d10","d12","d12+1","d12+2","d12+3","d12+4","d12+5"];
const STAT_COSTS = {d4:0,d6:1,d8:2,d10:3,d12:4,"d12+1":5,"d12+2":6,"d12+3":7,"d12+4":8,"d12+5":9};
const STATS = ["Strength","Dexterity","Vigor","Mind","Willpower"];
const ROLES = ["Warrior","Assassin","Destroyer","Support","Disabler"];
const statPointsUsed = (s) => Object.values(s).reduce((t,d)=>t+STAT_COSTS[d],0);
const dieValue = (d) => { const m={d4:4,d6:6,d8:8,d10:10,d12:12}; if(m[d])return m[d]; if(d.startsWith("d12+"))return 12+parseInt(d.slice(4)); return 4; };
// Vigor tier: 0 at d4, +1 per step. Each tier grants +5 HP and +5 Damage Shield cap.
const vigorTier     = (vig) => STAT_CHAIN.indexOf(vig);
// Parry = half DEX + 2
const calcParry     = (dex) => Math.floor(dieValue(dex)/2)+2;
// Ward = half WIL − 2 (minimum 0). Mind does NOT affect Ward per the rules.
const calcWard      = (wil) => Math.max(0,Math.floor(dieValue(wil)/2)-2);
// Armor = half VIG − 2 (minimum 0)
const calcArmor     = (vig) => Math.max(0,Math.floor((dieValue(vig)-2)/2));
// HP bonus from Vigor: +5 per tier above d4 (base 20 HP already includes d4)
const calcVigorHP   = (vig) => vigorTier(vig) * 5;
// Damage Shield cap: +5 per tier above d4 (0 at d4)
const calcDmgShield = (vig) => vigorTier(vig) * 5;
// Spell Range: base 2 + Mind die value + Willpower die value (each "point" = face value of die)
const calcSpellRange = (mind, wil) => 2 + dieValue(mind) + dieValue(wil);

const TIER_SILVER = {novice:50, adept:100, master:150};

// ─── STAT BONUS CALC ─────────────────────────────────────────────────────────
// Compute training bonuses ONLY from explicitly purchased trainings
function getTrainingBonuses(purchasedTrainings) {
  // purchasedTrainings: Set of "skillId:tier" strings
  let bonuses = {HP:0, Stamina:0, Mana:0, Parry:0, PhysRes:0, PrimDmg:0, Acc:0};
  for(const tree of SKILL_TREES) {
    const tiers = ["novice","adept","master"];
    for(const tier of tiers) {
      if(!purchasedTrainings.has(`${tree.id}:${tier}`)) continue;
      const training = tree.tiers[tier].training;
      if(training.effect === "statBonus") {
        bonuses[training.key] = (bonuses[training.key]||0) + training.value;
      }
      if(training.bonus) {
        if(training.bonus.includes("Primary Damage") && training.bonus.includes("Accuracy")) {
          bonuses.PrimDmg += 1; bonuses.Acc += 1;
        }
        if(training.bonus.includes("Parry") && training.bonus.includes("Physical Resistance")) {
          bonuses.Parry += 1; bonuses.PhysRes += 1;
        }
      }
    }
  }
  return bonuses;
}

// Compute total silver spent on skills (trainings + techniques)
function calcSkillSilverSpent(skills, purchasedTrainings, techniques) {
  let total = 0;
  const tierList = ["novice","adept","master"];
  for(const tree of SKILL_TREES) {
    for(let ti=0; ti<3; ti++) {
      const tier = tierList[ti];
      const silverCost = TIER_SILVER[tier];
      // Training cost
      if(purchasedTrainings.has(`${tree.id}:${tier}`)) total += silverCost;
      // Techniques cost
      const techs = ((techniques[tree.id]||{})[tier])||[];
      total += techs.length * silverCost;
    }
  }
  return total;
}

    purchasedTrainings:new Set(), // Set of "skillId:tier" strings
    masterPerks:{},        // {skillId: perkName}

  const setC = (field, val) => setChar(c=>({...c,[field]:val}));

  const trainBonuses = getTrainingBonuses(char.purchasedTrainings);

  // skill point budget
  const boonSP = char.boon?.name==="History of Discipline" ? 2 : 0;
  const totalSP = 3 + boonSP;
  const spUsed = Object.values(char.skills).reduce((t,v)=>t+v,0);
  const spLeft = totalSP - spUsed;

  // derived stats with bonuses
  const vigorHPBonus  = calcVigorHP(char.stats.Vigor);
  const finalHP       = char.attrs.HP + trainBonuses.HP + vigorHPBonus;
  const finalStamina  = char.attrs.Stamina + trainBonuses.Stamina;
  const finalMana     = char.attrs.Mana + (trainBonuses.Mana||0);
  const finalDmgShield= calcDmgShield(char.stats.Vigor);
  const baseParry     = calcParry(char.stats.Dexterity);
  const armorParryB   = char.equipment.armor?.parry||0;
  const shieldParryB  = (char.equipment.offhand?.parry)||0;
  const finalParry    = baseParry + armorParryB + shieldParryB + trainBonuses.Parry + (char.boon?.name==="Blessing of Power"?1:0);
  const finalWard     = calcWard(char.stats.Willpower) + (char.boon?.name==="Blessing of Power"?1:0);
  const armorBonus    = char.equipment.armor?.armor||0;
  const finalArmor    = calcArmor(char.stats.Vigor) + armorBonus;
  const finalSpellRange = calcSpellRange(char.stats.Mind, char.stats.Willpower);

  // Weapon bonuses (parse Acc+N and Dmg+N from props string)
  const weaponAccBonus = (() => {
    const m = char.equipment.weapon?.props?.match(/Acc\+(\d+)/);
    return m ? parseInt(m[1]) : 0;
  })();
  const weaponDmgBonus = (() => {
    const m = char.equipment.weapon?.props?.match(/Dmg\+(\d+)/);
    return m ? parseInt(m[1]) : 0;
  })();
  const jewelryAccBonus = char.equipment.jewelry.reduce((t,j) => {
    const m = j.bonus?.match(/Accuracy\+(\d+)/); return t + (m ? parseInt(m[1]) : 0);
  }, 0);
  const jewelryDmgBonus = char.equipment.jewelry.reduce((t,j) => {
    const m = j.bonus?.match(/Primary Damage\+(\d+)/); return t + (m ? parseInt(m[1]) : 0);
  }, 0);
  const boonOffensive = char.boon?.name==="Blessing of Power" ? 1 : 0;
  const accBonus  = trainBonuses.Acc + boonOffensive + weaponAccBonus + jewelryAccBonus;
  const dmgBonus  = trainBonuses.PrimDmg + boonOffensive + weaponDmgBonus + jewelryDmgBonus;
  const finalMeleeAcc = { die: char.stats.Dexterity, bonus: accBonus };
  const finalMeleeDmg = { die: char.stats.Strength,  bonus: dmgBonus };

  // equipment + skill money
  const moneySpent = [
    char.equipment.weapon?.cost||0,
    char.equipment.offhand?.cost||0,
    char.equipment.armor?.cost||0,
    char.equipment.catalyst?.cost||0,
    ...char.equipment.items.map(i=>i.cost),

    if(step===1) return char.role!=="";

    if(step===3) return stLeft>=0 && apLeft>=0;
    if(step===4) return spUsed<=totalSP;
    return true;
  };

        </div>
        <div>
          <div style={{fontSize:22,fontWeight:700,letterSpacing:"0.22em",background:"linear-gradient(135deg,#c8a84a,#edd880,#b89030,#f0d870)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>TSR 5.0</div>
          <div style={{fontSize:9,color:"#9a88c0",letterSpacing:"0.4em",marginTop:2}}>IMPERIAL REGISTRY · CITIZEN DOSSIER</div>
        </div>
        <div style={{flex:1,height:1,background:"linear-gradient(90deg,transparent,rgba(76,200,224,0.25),transparent)",margin:"0 8px"}}/>
        {char.name&&<div style={{textAlign:"right"}}>
          <div style={{fontSize:9,color:"#9a88c0",letterSpacing:"0.2em",marginBottom:2}}>REGISTERED SUBJECT</div>

          <div style={{fontSize:10,color:"#e05a6a",letterSpacing:"0.1em",fontWeight:700}}>LEVEL I</div>
        </div>
      </header>

      <nav style={{display:"flex",borderBottom:"2px solid #d0c0e8",background:"rgba(255,255,255,0.6)",backdropFilter:"blur(6px)",overflowX:"auto",boxShadow:"0 2px 10px rgba(30,16,56,0.08)"}}>
        {STEPS.map((s,i)=>(
          <button key={s.id} onClick={()=>i<=step&&setStep(i)} style={{
            flex:1,minWidth:72,padding:"10px 6px",border:"none",
            background:i===step?"rgba(76,200,224,0.08)":"transparent",
            borderBottom:i===step?"3px solid #4cc8e0":"3px solid transparent",

            transition:"color 0.15s,background 0.15s",
          }}>
            <span style={{fontSize:14}}>{s.icon}</span>
            <span>{s.label.toUpperCase()}</span>
            {i<step&&<span style={{fontSize:8,color:"#c8a84a"}}>◆</span>}
          </button>
        ))}
      </nav>

      <main style={{flex:1,maxWidth:960,width:"100%",margin:"0 auto",padding:"28px 20px",boxSizing:"border-box"}}>
        {step===0 && <StepIdentity char={char} setC={setC}/>}

            {key:"Stamina",label:"Stamina",base:10,desc:"Fuels Techniques. 0 = risk Unconscious."},
            {key:"Mana",label:"Mana",base:0,desc:"Fuels Spells. 0 = Manashock risk."},
          ].map(({key,label,desc})=>(
            <div key={key} style={{marginBottom:10,padding:"10px 12px",background:"rgba(255,255,255,0.82)",border:"1px solid #cebee8",borderRadius:3}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                <span style={{fontSize:12,fontWeight:600,color:"#1e1430"}}>{label}</span>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <button onClick={()=>updAttr(key,char.attrs[key]-1)} style={sm}>−</button>
                  <span style={{fontSize:14,color:"#c8a84a",minWidth:36,textAlign:"center",fontWeight:700}}>{char.attrs[key]}</span>
                  <button onClick={()=>updAttr(key,char.attrs[key]+1)} style={sm}>+</button>
                </div>
              </div>
              <div style={{fontSize:10,color:"#6a50a0"}}>{desc}</div>
            </div>
          ))}
          {/* Derived block */}
          <div style={{marginTop:12,padding:"12px",background:"rgba(255,255,255,0.82)",border:"1px solid #cebee8",borderRadius:3}}>
            <div style={{fontSize:10,color:"#c8a84a",letterSpacing:"0.12em",marginBottom:8}}>DERIVED STATS (base — training bonuses apply later)</div>
            {[
              ["Max HP",`${char.attrs.HP + calcVigorHP(char.stats.Vigor)} (${char.attrs.HP} base + ${calcVigorHP(char.stats.Vigor)} from Vigor)`],
              ["Dmg Shield Cap",`${calcDmgShield(char.stats.Vigor)} (${vigorTier(char.stats.Vigor)} × 5 from Vigor)`],
              ["Parry",`${calcParry(char.stats.Dexterity)} (½ DEX + 2)`],
              ["Armor",`${calcArmor(char.stats.Vigor)} (½ VIG − 2)`],
              ["Ward",`${calcWard(char.stats.Willpower)} (½ WIL − 2)`],
              ["Spell Range",`${calcSpellRange(char.stats.Mind,char.stats.Willpower)} (2 + ${dieValue(char.stats.Mind)} Mind + ${dieValue(char.stats.Willpower)} WIL)`],
              ["Carry Cap",`${char.attrs.Stamina} (= Stamina)`],
              ["Tech Slots",`${char.attrs.Stamina} (= Stamina)`],
              ["Spell Slots",`${char.attrs.Mana} (= Mana)`],
            ].map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:4,paddingBottom:4,borderBottom:"1px solid rgba(200,180,230,0.4)"}}>
                <span style={{color:"#8a78a8"}}>{k}</span>
                <span style={{color:"#3a2858"}}>{v}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── STEP SKILLS ─────────────────────────────────────────────────────────────
function StepSkills({char,setChar,spLeft,totalSP,moneyLeft,skillSilverSpent}){
  const [openTree,setOpenTree]=useState(null);
  const isVoA=char.boon?.name==="Vow of Ash";
  const isRoE=char.boon?.name==="Rite of Embers";
  const RANK_LABELS=["None","Novice","Adept","Master"];
  const TIERS=["novice","adept","master"];

  const setRank=(id,rank)=>setChar(c=>{
    const cur=c.skills[id]||0,diff=rank-cur;
    const newUsed=Object.values(c.skills).reduce((t,v)=>t+v,0)+diff;
    const bSP=c.boon?.name==="History of Discipline"?2:0;
    if(newUsed>3+bSP)return c;
    const tree=SKILL_TREES.find(s=>s.id===id);
    if(isVoA&&tree?.type==="magic"&&rank>0)return c;
    if(isRoE&&tree?.type==="physical"&&rank>0)return c;
    // Strip data from tiers being removed
    const newTechs={...c.techniques};
    const newMPs={...c.masterPerks};
    const newPT=new Set(c.purchasedTrainings);
    if(rank<3){
      delete newMPs[id];
      if(newTechs[id]?.master){const t={...newTechs[id]};delete t.master;newTechs[id]=t;}
      newPT.delete(`${id}:master`);
    }
    if(rank<2){
      if(newTechs[id]?.adept){const t={...newTechs[id]};delete t.adept;newTechs[id]=t;}
      newPT.delete(`${id}:adept`);
    }
    if(rank<1){
      delete newTechs[id];
      newPT.delete(`${id}:novice`);
    }
    return{...c,skills:{...c.skills,[id]:rank},techniques:newTechs,masterPerks:newMPs,purchasedTrainings:newPT};
  });

  // Which skill tree (if any) currently owns the training line?
  const trainingTreeId = (() => {
    for(const tree of SKILL_TREES) {
      const tiers = ["novice","adept","master"];
      if(tiers.some(t => char.purchasedTrainings.has(`${tree.id}:${t}`))) return tree.id;
    }
    return null;
  })();

  const toggleTraining=(skillId,tier)=>setChar(c=>{
    const key=`${skillId}:${tier}`;
    const silverCost=TIER_SILVER[tier];
    const already=c.purchasedTrainings.has(key);
    if(!already){
      // Block if a DIFFERENT tree already owns the training line
      const tiers2=["novice","adept","master"];
      const ownerTree=SKILL_TREES.find(t=>t.id!==skillId&&tiers2.some(ti=>c.purchasedTrainings.has(`${t.id}:${ti}`)));
      if(ownerTree)return c;
      // Check silver
      const equipSpent=[c.equipment.weapon?.cost||0,c.equipment.offhand?.cost||0,c.equipment.armor?.cost||0,c.equipment.catalyst?.cost||0,...c.equipment.items.map(i=>i.cost),...c.equipment.jewelry.map(j=>j.cost)].reduce((a,b)=>a+b,0);
      const currentSkillSpent=calcSkillSilverSpent(c.skills,c.purchasedTrainings,c.techniques);
      if(equipSpent+currentSkillSpent+silverCost>c.money)return c;
    }
    const newPT=new Set(c.purchasedTrainings);
    already?newPT.delete(key):newPT.add(key);
    return{...c,purchasedTrainings:newPT};
  });

  const toggleTechnique=(skillId,tier,techName)=>setChar(c=>{
    const cur=((c.techniques[skillId]||{})[tier])||[];
    const exists=cur.includes(techName);
    const silverCost=TIER_SILVER[tier];
    if(!exists){
      const equipSpent=[c.equipment.weapon?.cost||0,c.equipment.offhand?.cost||0,c.equipment.armor?.cost||0,c.equipment.catalyst?.cost||0,...c.equipment.items.map(i=>i.cost),...c.equipment.jewelry.map(j=>j.cost)].reduce((a,b)=>a+b,0);
      const currentSkillSpent=calcSkillSilverSpent(c.skills,c.purchasedTrainings,c.techniques);
      if(equipSpent+currentSkillSpent+silverCost>c.money)return c;
    }
    return{...c,techniques:{...c.techniques,[skillId]:{...(c.techniques[skillId]||{}),[tier]:exists?cur.filter(n=>n!==techName):[...cur,techName]}}};
  });

  const setMasterPerk=(skillId,perkName)=>setChar(c=>({...c,masterPerks:{...c.masterPerks,[skillId]:c.masterPerks[skillId]===perkName?undefined:perkName}}));

  const phys=SKILL_TREES.filter(s=>s.type==="physical");
  const magic=SKILL_TREES.filter(s=>s.type==="magic");

  return(
    <div>
      <ST>Skill Trees & Techniques</ST>
      {/* Budget bar */}
      <div style={{display:"flex",gap:10,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{padding:"6px 12px",background:"rgba(255,255,255,0.82)",border:"1px solid #cebee8",borderRadius:3,fontSize:11}}>
          🎯 <span style={{color:"#c8a84a",fontWeight:700}}>{spLeft}</span> / {totalSP} Skill Points
        </div>
        <div style={{padding:"6px 12px",background:"rgba(255,255,255,0.82)",border:moneyLeft<0?"1px solid #c94a4c":"1px solid #cebee8",borderRadius:3,fontSize:11}}>
          💰 <span style={{color:moneyLeft<0?"#c05040":"#c8a84a",fontWeight:700}}>{moneyLeft}</span> Silver left
          {skillSilverSpent>0&&<span style={{color:"#8a78a8",marginLeft:6}}>(spent {skillSilverSpent}s on skills)</span>}
        </div>
        <span style={{fontSize:10,color:"#6a50a0"}}>Novice=50s · Adept=100s · Master=150s per training or technique</span>
      </div>
      {isVoA&&<Banner>Vow of Ash: Cannot invest in Magic skills.</Banner>}
      {isRoE&&<Banner>Rite of Embers: Cannot invest in Physical skills.</Banner>}
      {trainingTreeId&&<Banner style={{borderColor:"#4a9a30",background:"rgba(228,222,248,0.88)",color:"#2a7010"}}>Training line locked to: <strong>{SKILL_TREES.find(t=>t.id===trainingTreeId)?.name}</strong>. Refund its trainings to switch trees.</Banner>}

      {[["Physical Skills",phys],["Magic Skills",magic]].map(([title,trees])=>(
        <div key={title} style={{marginTop:18}}>
          <div style={{fontSize:11,color:"#c8a84a",letterSpacing:"0.15em",marginBottom:8}}>{title.toUpperCase()}</div>
          {trees.map(tree=>{
            const rank=char.skills[tree.id]||0;
            const locked=(isVoA&&tree.type==="magic")||(isRoE&&tree.type==="physical");
            const isOpen=openTree===tree.id;
            return(
              <div key={tree.id} style={{marginBottom:8,border:rank>0?"1px solid #b8a8d8":"1px solid #d8c8f0",borderRadius:3,background:"rgba(255,255,255,0.7)",opacity:locked?0.4:1}}>
                {/* Tree header */}
                <div style={{padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:13,fontWeight:600,color:rank>0?"#2a1848":"#b0a0c8"}}>{tree.name}</span>
                      <span style={{fontSize:10,color:rank>0?"#2a1848":"#b0a0c8",padding:"1px 6px",background:"rgba(200,168,74,0.1)",borderRadius:3}}>{RANK_LABELS[rank]}</span>
                    </div>
                    <div style={{fontSize:10,color:"#a090c0",marginTop:2}}>{tree.desc}</div>
                  </div>
                  {/* Rank buttons (skill point cost shown) */}
                  <div style={{display:"flex",gap:3}}>
                    {[0,1,2,3].map(r=>(
                      <button key={r} onClick={()=>!locked&&setRank(tree.id,r)} style={{
                        padding:"3px 8px",border:"none",cursor:locked?"default":"pointer",
                        background:rank>=r&&r>0?"#ddd0ff":"#f0ecff",
                        color:rank>=r&&r>0?"#2a1848":"#b0a0c8",
                        fontSize:9,fontFamily:"inherit",borderRadius:3,
                      }}>{RANK_LABELS[r]}{r>0?` (${r}pt)`:""}</button>
                    ))}
                  </div>
                  {rank>0&&(
                    <button onClick={()=>setOpenTree(isOpen?null:tree.id)} style={{padding:"4px 10px",border:"1px solid #cebee8",background:"transparent",color:"#8a78a8",cursor:"pointer",fontSize:10,fontFamily:"inherit",borderRadius:3,whiteSpace:"nowrap"}}>
                      {isOpen?"▲ Hide":"▼ Buy"}
                    </button>
                  )}
                </div>

                {/* Expanded pane */}
                {isOpen&&rank>0&&(
                  <div style={{borderTop:"1px solid #cebee8",padding:"14px"}}>
                    {TIERS.map((tier,ti)=>{
                      if(rank<ti+1)return null;
                      const tierData=tree.tiers[tier];
                      const selTechs=((char.techniques[tree.id]||{})[tier])||[];
                      const training=tierData.training;
                      const techniques=tierData.techniques;
                      const trainingKey=`${tree.id}:${tier}`;
                      const trainingBought=char.purchasedTrainings.has(trainingKey);
                      const trainingLocked=!trainingBought&&trainingTreeId!==null&&trainingTreeId!==tree.id;
                      const silverCost=TIER_SILVER[tier];
                      return(
                        <div key={tier} style={{marginBottom:18}}>
                          {/* Tier label */}
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                            <span style={{fontSize:10,color:"#c8a84a",letterSpacing:"0.1em"}}>{tier.toUpperCase()} TIER</span>
                            <span style={{fontSize:9,color:"#8a78a8"}}>— each item costs {silverCost}s</span>
                          </div>

                          {/* Training — purchasable, locked if another tree owns the training line */}
                          <button onClick={()=>!trainingLocked&&toggleTraining(tree.id,tier)} style={{
                            width:"100%",
                            border:trainingBought?"1px solid #c8a84a":trainingLocked?"1px solid #cebee8":"1px solid #cebee8",
                            background:trainingBought?"linear-gradient(135deg,rgba(76,200,224,0.1),rgba(30,12,50,0.95))":trainingLocked?"#f8f4ff":"rgba(255,255,255,0.8)",
                            color:"inherit",padding:"9px 12px",
                            cursor:trainingLocked?"not-allowed":"pointer",
                            textAlign:"left",fontFamily:"inherit",borderRadius:3,marginBottom:8,
                            display:"flex",alignItems:"flex-start",gap:8,
                            opacity:trainingLocked?0.4:1,
                          }}>
                            <span style={{fontSize:10,color:trainingBought?"#2a1848":trainingLocked?"#c0b0d8":"#8a78a8",whiteSpace:"nowrap",marginTop:1}}>⚡ TRAINING</span>
                            <div style={{flex:1}}>
                              <span style={{fontSize:11,color:trainingBought?"#1e1430":trainingLocked?"#c8b8e0":"#7a68a0",fontWeight:600}}>{training.name}</span>
                              <span style={{fontSize:10,color:trainingBought?"#3a2858":trainingLocked?"#c0b0d8":"#8a78a8",marginLeft:6}}>{training.desc}</span>
                            </div>
                            <span style={{fontSize:10,color:trainingBought?"#2a1848":trainingLocked?"#c0b0d8":"#8a78a8",whiteSpace:"nowrap",marginLeft:8}}>
                              {trainingBought?"✓ Purchased":trainingLocked?"🔒 Locked":`${silverCost}s`}
                            </span>
                          </button>

                          {/* Techniques */}
                          {techniques.length>0&&(
                            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                              {techniques.map(tech=>{
                                const sel=selTechs.includes(tech.name);
                                return(
                                  <button key={tech.name} onClick={()=>toggleTechnique(tree.id,tier,tech.name)} style={{
                                    border:sel?"1px solid #c8a84a":"1px solid #d8c8f0",
                                    background:sel?"linear-gradient(135deg,#ede0ff,#e0d0ff)":"rgba(255,255,255,0.85)",
                                    color:"inherit",padding:"8px 10px",cursor:"pointer",
                                    textAlign:"left",fontFamily:"inherit",borderRadius:3,
                                  }}>
                                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:3}}>
                                      <span style={{fontSize:11,fontWeight:600,color:sel?"#2a1848":"#6a50a0"}}>{tech.name}</span>
                                      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2,marginLeft:4,flexShrink:0}}>
                                        <span style={{fontSize:9,color:sel?"#c9a84c":"#3a2a5a"}}>{sel?"✓":silverCost+"s"}</span>
                                        <span style={{fontSize:8,color:"#6a50a0"}}>{tech.cost}</span>
                                      </div>
                                    </div>
                                    <div style={{fontSize:10,color:sel?"#c8bca0":"#2e2248",lineHeight:1.4}}>{tech.desc}</div>
                                  </button>
                                );
                              })}
                            </div>
                          )}

                          {/* Master Perks (free — perk selection only) */}
                          {tier==="master"&&tree.masterPerks&&(
                            <div style={{marginTop:10}}>
                              <div style={{fontSize:10,color:"#c8a84a",letterSpacing:"0.1em",marginBottom:6}}>★ MASTER PERK — choose one (free)</div>
                              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                                {tree.masterPerks.map(p=>{
                                  const sel=char.masterPerks[tree.id]===p.name;
                                  return(
                                    <button key={p.name} onClick={()=>setMasterPerk(tree.id,p.name)} style={{
                                      border:sel?"1px solid #c8a84a":"1px solid #cebee8",
                                      background:sel?"#fffbe8":"white",
                                      color:"inherit",padding:"8px 10px",cursor:"pointer",
                                      textAlign:"left",fontFamily:"inherit",borderRadius:3,
                                    }}>
                                      <div style={{fontSize:11,fontWeight:700,color:sel?"#d4a030":"#4a3a6a",marginBottom:4}}>{p.name}</div>
                                      <div style={{fontSize:10,color:sel?"#c8bca0":"#2e2248",lineHeight:1.4}}>{p.desc}</div>
                                    </button>
                                  );
                                })}
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// ─── STEP EQUIPMENT ──────────────────────────────────────────────────────────
function StepEquipment({char,setChar,moneyLeft}){
  const [tab,setTab]=useState("weapons");
  const setEq=(key,val)=>setChar(c=>({...c,equipment:{...c.equipment,[key]:val}}));
  const toggleList=(list,item)=>setChar(c=>{
    const exists=c.equipment[list].find(i=>i.name===item.name);
    return{...c,equipment:{...c.equipment,[list]:exists?c.equipment[list].filter(i=>i.name!==item.name):[...c.equipment[list],item]}};
  });
  const TABS=["weapons","armor","catalysts","jewelry","alchemical"];

  return(
    <div>
      <ST>Equipment</ST>
      <div style={{display:"flex",gap:12,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{padding:"8px 14px",background:"rgba(255,255,255,0.88)",border:"1px solid #b8a8d8",borderRadius:3,fontSize:12}}>
          💰 <span style={{color:"#c8a84a",fontWeight:700}}>{moneyLeft}</span> Silver remaining
        </div>
        <div style={{padding:"8px 14px",background:"rgba(255,255,255,0.88)",border:"1px solid #b8a8d8",borderRadius:3,fontSize:12}}>
          {char.equipment.weapon?"🗡 "+char.equipment.weapon.name:"No weapon selected"}
        </div>
        <div style={{padding:"8px 14px",background:"rgba(255,255,255,0.88)",border:"1px solid #b8a8d8",borderRadius:3,fontSize:12}}>
          {char.equipment.armor?"🛡 "+char.equipment.armor.name:"No armor"}
        </div>
      </div>
      <div style={{display:"flex",gap:0,marginBottom:16,borderBottom:"1px solid #cebee8"}}>
        {TABS.map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{padding:"7px 12px",border:"none",cursor:"pointer",background:"transparent",borderBottom:tab===t?"1px solid #c8a84a":"2px solid transparent",color:tab===t?"#c9a84c":"#2e2248",fontSize:11,fontFamily:"inherit",textTransform:"capitalize"}}>
            {t}
          </button>
        ))}
      </div>

      {tab==="weapons"&&(
        <div>
          {Object.entries(WEAPONS_DATA).map(([cat,items])=>(
            <div key={cat} style={{marginBottom:20}}>
              <div style={{fontSize:10,color:"#8a78a8",letterSpacing:"0.12em",marginBottom:6}}>{cat.toUpperCase()}</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
                <thead><tr style={{color:"#a090c0",borderBottom:"1px solid #cebee8"}}>
                  {["Name","Damage","Properties","Min STR","Wt","Cost",""].map(h=><th key={h} style={thS}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {items.map(w=>{
                    const isMW=char.equipment.weapon?.name===w.name;
                    const isOH=char.equipment.offhand?.name===w.name;
                    return(
                      <tr key={w.name} style={{borderBottom:"1px solid rgba(200,180,230,0.4)",background:isMW||isOH?"rgba(42,24,72,0.06)":"transparent"}}>
                        <td style={tdS}>{w.name}</td>
                        <td style={{...tdS,color:"#c8a84a"}}>{w.dmg}</td>
                        <td style={{...tdS,color:"#8a78a8"}}>{w.props}</td>
                        <td style={tdS}>{w.minStr}</td>
                        <td style={tdS}>{w.wt}</td>
                        <td style={tdS}>{w.cost}s</td>
                        <td style={tdS}>

            })}</tbody>
          </table>
          <div style={{fontSize:10,color:"#8a78a8",letterSpacing:"0.12em",marginBottom:6}}>SHIELDS</div>

            <thead><tr style={{color:"#a090c0",borderBottom:"1px solid #cebee8"}}>

              return(<tr key={s.name} style={{borderBottom:"1px solid rgba(200,180,230,0.4)",background:sel?"rgba(42,24,72,0.06)":"transparent"}}>

                <td style={tdS}>{s.minStr}</td>
                <td style={tdS}>{s.wt}</td>
                <td style={tdS}>{s.cost}s</td>
                <td style={tdS}><button onClick={()=>setEq("offhand",sel?null:s)} style={{...mic,background:sel?"#e8d8ff":"transparent",color:sel?"#c9a84c":"#2e2248"}}>{sel?"Equipped":"Equip"}</button></td>
              </tr>);
            })}</tbody>
          </table>
        </div>
      )}
      {tab==="catalysts"&&(
        <div>
          <p style={{...sub,marginBottom:10}}>Require Spellcrafting or relevant magic skill.</p>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
            <thead><tr style={{color:"#a090c0",borderBottom:"1px solid #cebee8"}}>
              {["Name","Damage","Properties","Min Mind","Cost",""].map(h=><th key={h} style={thS}>{h}</th>)}
            </tr></thead>
            <tbody>{CATALYSTS_DATA.map(c=>{
              const sel=char.equipment.catalyst?.name===c.name;
              return(<tr key={c.name} style={{borderBottom:"1px solid rgba(200,180,230,0.4)",background:sel?"rgba(42,24,72,0.06)":"transparent"}}>
                <td style={tdS}>{c.name}</td>
                <td style={{...tdS,color:"#c8a84a"}}>{c.dmg}</td>
                <td style={{...tdS,color:"#8a78a8"}}>{c.props}</td>
                <td style={tdS}>{c.minMind}</td>
                <td style={tdS}>{c.cost}s</td>
                <td style={tdS}><button onClick={()=>setEq("catalyst",sel?null:c)} style={{...mic,background:sel?"#e8d8ff":"transparent",color:sel?"#c9a84c":"#2e2248"}}>{sel?"Equipped":"Equip"}</button></td>
              </tr>);
            })}</tbody>
          </table>
        </div>
      )}
      {tab==="jewelry"&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {JEWELRY_DATA.map(j=>{
            const sel=char.equipment.jewelry.find(x=>x.name===j.name);
            return(<button key={j.name} onClick={()=>toggleList("jewelry",j)} style={{border:sel?"1px solid #c8a84a":"1px solid #cebee8",background:sel?"linear-gradient(135deg,#ede0ff,#e0d0ff)":"rgba(255,255,255,0.85)",color:"inherit",padding:"14px",cursor:"pointer",textAlign:"left",fontFamily:"inherit",borderRadius:3}}>
              <div style={{fontWeight:600,color:sel?"#c9a84c":"#3a2a5a",marginBottom:4}}>{j.name}</div>
              <div style={{fontSize:10,color:sel?"#c8b898":"#4a6a4a"}}>{j.bonus} — {j.cost}s</div>
            </button>);
          })}
        </div>
      )}
      {tab==="alchemical"&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {ALCHEMICAL_DATA.map(a=>{
            const sel=char.equipment.items.find(x=>x.name===a.name);
            return(<button key={a.name} onClick={()=>toggleList("items",a)} style={{border:sel?"1px solid #c8a84a":"1px solid #cebee8",background:sel?"linear-gradient(135deg,#ede0ff,#e0d0ff)":"rgba(255,255,255,0.85)",color:"inherit",padding:"14px",cursor:"pointer",textAlign:"left",fontFamily:"inherit",borderRadius:3}}>
              <div style={{fontWeight:600,color:sel?"#c9a84c":"#3a2a5a",marginBottom:4}}>{a.name}</div>
              <div style={{fontSize:10,color:sel?"#c8b898":"#4a6a4a"}}>{a.desc} — {a.cost}s</div>
            </button>);
          })}
        </div>
      )}
    </div>
  );
}

// ─── STEP SUMMARY ─────────────────────────────────────────────────────────────
function StepSummary({char,derived,totalSP}){
  const {finalHP,finalStamina,finalMana,finalParry,finalWard,finalArmor,finalDmgShield,finalSpellRange,finalMeleeAcc,finalMeleeDmg,trainBonuses,moneyLeft}=derived;
  const RANK_LABELS=["","Novice","Adept","Master"];
  const TIERS=["novice","adept","master"];

  const copySheet=()=>{
    const lines=[
      `=== TSR 5.0 CHARACTER SHEET ===`,
      `Name: ${char.name||"—"}  |  Race: ${char.race||"—"}  |  Level: 1`,
      `Role: ${char.role||"—"}  |  Starting Boon: ${char.boon?.name||"—"}`,
      ``,`STATS:`,
      ...STATS.map(s=>`  ${s}: ${char.stats[s]}`),
      ``,`ATTRIBUTES (incl. training bonuses):`,
      `  HP: ${finalHP}  |  Stamina: ${finalStamina}  |  Mana: ${finalMana}`,
      ``,`DERIVED:`,
      `  Melee Accuracy: ${finalMeleeAcc.die}${finalMeleeAcc.bonus!==0?" (+"+ finalMeleeAcc.bonus+")":""}  |  Primary Damage: ${finalMeleeDmg.die}${finalMeleeDmg.bonus!==0?" (+"+finalMeleeDmg.bonus+")":""}`,
      `  Parry: ${finalParry}  |  Armor: ${finalArmor}  |  Ward: ${finalWard}`,
      `  Movement: 6  |  Carry Cap: ${finalStamina}  |  Tech Slots: ${finalStamina}  |  Spell Slots: ${finalMana}`,
      ``,`SKILLS:`,
      ...SKILL_TREES.filter(t=>char.skills[t.id]>0).map(t=>{
        const rank=char.skills[t.id];
        const perk=char.masterPerks[t.id];
        const techList=Object.entries(char.techniques[t.id]||{}).flatMap(([,ts])=>ts);
        return `  ${t.name}: ${RANK_LABELS[rank]}${perk?" [Perk: "+perk+"]":""}${techList.length?" — "+techList.join(", "):""}`;
      }),
      ``,`EQUIPMENT:`,
      `  Weapon: ${char.equipment.weapon?.name||"—"}`,
      `  Off-hand: ${char.equipment.offhand?.name||"—"}`,
      `  Armor: ${char.equipment.armor?.name||"—"}`,
      `  Catalyst: ${char.equipment.catalyst?.name||"—"}`,
      `  Jewelry: ${char.equipment.jewelry.map(j=>j.name).join(", ")||"—"}`,
      `  Items: ${char.equipment.items.map(i=>i.name).join(", ")||"—"}`,
      `  Money remaining: ${moneyLeft} Silver`,
    ];
    navigator.clipboard.writeText(lines.join("\n")).catch(()=>{});
  };

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <ST style={{margin:0}}>Character Sheet</ST>
        <button onClick={copySheet} style={{...btnS("pri"),padding:"8px 16px",fontSize:11}}>📋 Copy Sheet</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
        <Card title="Identity">
          {[["Name",char.name||"—"],["Race",char.race||"—"],["Level","1 (0/10 EXP)"],["Role",char.role||"—"],["Boon",char.boon?.name||"—"]].map(([k,v])=><Row key={k} label={k} val={v}/>)}
        </Card>
        <Card title="Attributes">
          {[["HP",finalHP,true],["Stamina",finalStamina,true],["Mana",finalMana,true],["Dmg Shield Cap",finalDmgShield,true],["Tech Slots",finalStamina+""],["Spell Slots",finalMana+""]].map(([k,v,h])=><Row key={k} label={k} val={v} hi={h}/>)}
        </Card>
        <Card title="Stats">
          {STATS.map(s=><Row key={s} label={s} val={char.stats[s]} hi/>)}
        </Card>
        <Card title="Combat Reference">
          {[
            ["Melee Accuracy", `${finalMeleeAcc.die}${finalMeleeAcc.bonus>0?" (+"+finalMeleeAcc.bonus+")":finalMeleeAcc.bonus<0?" ("+finalMeleeAcc.bonus+")":""}`, true],
            ["Primary Damage",  `${finalMeleeDmg.die}${finalMeleeDmg.bonus>0?" (+"+finalMeleeDmg.bonus+")":finalMeleeDmg.bonus<0?" ("+finalMeleeDmg.bonus+")":""}`, true],
            ["Parry",finalParry,true],["Armor",finalArmor,true],["Ward",finalWard,true],
            ["Dmg Shield Cap",finalDmgShield,true],
            ["Spell Range",finalSpellRange,true],
            ["Movement","6 Spaces"],["Carry Cap",finalStamina+" wt"],["Money left",moneyLeft+" Silver",true],
          ].map(([k,v,h])=><Row key={k} label={k} val={v} hi={h}/>)}
        </Card>
      </div>
      {/* Skills with techniques */}
      <Card title="Skills, Techniques & Master Perks">
        {SKILL_TREES.filter(t=>char.skills[t.id]>0).length===0
          ?<span style={{fontSize:11,color:"#6a50a0"}}>No skills selected.</span>
          :SKILL_TREES.filter(t=>char.skills[t.id]>0).map(tree=>{
            const rank=char.skills[tree.id];
            const perk=char.masterPerks[tree.id];
            return(
              <div key={tree.id} style={{marginBottom:12,paddingBottom:12,borderBottom:"1px solid rgba(200,180,230,0.4)"}}>
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4}}>
                  <span style={{fontSize:12,fontWeight:600,color:"#c8a84a"}}>{tree.name}</span>
                  <span style={{fontSize:10,color:"#c8a84a",padding:"1px 5px",background:"rgba(200,168,74,0.1)",borderRadius:3}}>{RANK_LABELS[rank]}</span>
                </div>
                {/* Only show PURCHASED trainings */}
                {TIERS.slice(0,rank).filter(tier=>char.purchasedTrainings.has(`${tree.id}:${tier}`)).map(tier=>(
                  <div key={tier} style={{fontSize:10,color:"#4cc8e0",marginBottom:2}}>
                    ⚡ {tree.tiers[tier].training.name}: {tree.tiers[tier].training.desc}
                  </div>
                ))}
                {/* Selected techniques */}
                {Object.entries(char.techniques[tree.id]||{}).map(([tier,techs])=>
                  techs.map(t=>(
                    <div key={t} style={{fontSize:10,color:"#3a2858",marginBottom:2}}>• {t}</div>
                  ))
                )}
                {perk&&<div style={{fontSize:10,color:"#c8a84a",marginTop:3}}>★ Master Perk: {perk}</div>}
              </div>
            );
          })
        }
      </Card>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginTop:16}}>
        <Card title="Equipment">
          {[["Weapon",char.equipment.weapon?.name||"—"],["Off-hand",char.equipment.offhand?.name||"—"],["Armor",char.equipment.armor?`${char.equipment.armor.name} (${char.equipment.armor.bonus})`:"—"],["Catalyst",char.equipment.catalyst?.name||"—"]].map(([k,v])=><Row key={k} label={k} val={v}/>)}
          {char.equipment.jewelry.length>0&&<Row label="Jewelry" val={char.equipment.jewelry.map(j=>j.name).join(", ")}/>}
          {char.equipment.items.length>0&&<Row label="Items" val={char.equipment.items.map(i=>i.name).join(", ")}/>}
        </Card>
        {char.boon&&(
          <Card title="Boon Details">
            <div style={{fontSize:12,fontWeight:600,color:"#c8a84a",marginBottom:6}}>{char.boon.name}</div>
            <div style={{fontSize:11,color:"#7a68a0",lineHeight:1.5}}>{char.boon.desc}</div>
          </Card>
        )}
      </div>
      <div style={{marginTop:12,padding:"10px 14px",background:"rgba(255,255,255,0.65)",border:"1px solid #cebee8",borderRadius:3,fontSize:10,color:"#8a78a8",textAlign:"center"}}>
        Character complete! Submit to an Admin for approval. Use "Copy Sheet" to get your formatted sheet.
      </div>
    </div>
  );
}

// ─── SHARED UI ───────────────────────────────────────────────────────────────
function ST({children}){return(
  <div style={{marginBottom:16}}>
    <h2 style={{fontSize:17,fontWeight:700,letterSpacing:"0.1em",color:"#2a1848",marginBottom:0,paddingBottom:10,fontFamily:"'Palatino Linotype',Palatino,Georgia,serif",borderBottom:"1px solid #d0c0e8",display:"flex",alignItems:"center",gap:10}}>
      <span style={{color:"#4cc8e0",fontSize:12}}>◆</span>
      {children}
      <span style={{flex:1,height:1,background:"linear-gradient(90deg,rgba(76,200,224,0.2),transparent)",display:"inline-block",marginLeft:8,verticalAlign:"middle"}}/>
    </h2>
  </div>
);}
function Lbl({children}){return <div style={{fontSize:9,color:"#8a78a8",letterSpacing:"0.15em",marginBottom:5,fontWeight:700,textTransform:"uppercase"}}>{children}</div>;}
function Banner({children}){return <div style={{padding:"8px 14px",background:"rgba(139,26,42,0.06)",border:"1px solid #e0b0b8",borderLeft:"3px solid #8b1a2a",borderRadius:2,fontSize:11,color:"#7a2030",marginBottom:10,letterSpacing:"0.02em"}}>⚠ {children}</div>;}
function Card({title,children}){return(
  <div style={{background:"rgba(255,255,255,0.75)",border:"1px solid #cebee8",borderTop:"2px solid #2a1848",borderRadius:3,padding:"16px",boxShadow:"0 2px 16px rgba(30,16,56,0.08)"}}>
    <div style={{fontSize:9,color:"#6a50a0",letterSpacing:"0.22em",marginBottom:12,fontWeight:700,display:"flex",alignItems:"center",gap:6}}>
      <span style={{display:"inline-block",width:12,height:1,background:"rgba(76,200,224,0.5)"}}/>
      {title.toUpperCase()}
      <span style={{display:"inline-block",flex:1,height:1,background:"linear-gradient(90deg,rgba(76,200,224,0.3),transparent)"}}/>
    </div>
    {children}
  </div>
);}
function Row({label,val,hi}){return <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:5,paddingBottom:5,borderBottom:"1px solid rgba(200,180,230,0.4)"}}><span style={{color:"#8a78a8"}}>{label}</span><span style={{color:hi?"#2a1848":"#3a2858",fontWeight:hi?700:400}}>{val}</span></div>;}
const sub={fontSize:12,color:"#7a68a0",lineHeight:1.6,marginBottom:0};
const inp={width:"100%",background:"rgba(255,255,255,0.9)",border:"1px solid #cebee8",borderBottom:"2px solid #8a78b8",color:"#1e1430",padding:"9px 12px",fontSize:12,fontFamily:"'Palatino Linotype',Palatino,Georgia,serif",outline:"none",boxSizing:"border-box",borderRadius:2,boxShadow:"0 1px 4px rgba(30,16,56,0.07)"};
const sm={width:26,height:26,border:"1px solid #cebee8",background:"white",color:"#6a50a0",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit",borderRadius:2,padding:0,boxShadow:"0 1px 3px rgba(30,16,56,0.1)"};
const mic={padding:"3px 8px",border:"1px solid #cebee8",cursor:"pointer",fontSize:9,fontFamily:"inherit",borderRadius:2,background:"rgba(255,255,255,0.8)",color:"#7a68a0"};
const thS={padding:"6px 8px",textAlign:"left",fontWeight:700,fontSize:9,letterSpacing:"0.12em",color:"#8a78a8",borderBottom:"1px solid #d8c8f0"};
const tdS={padding:"7px 8px",fontSize:10,color:"#3a2858"};
const btnS=(t)=>({
  padding:"9px 22px",
  border:t==="pri"?"1px solid #6a1828":"1px solid #cebee8",
  background:t==="pri"?"linear-gradient(135deg,#3a0e1a,#5a1828,#3a0e1a)":"rgba(255,255,255,0.7)",
  color:t==="pri"?"#e8c060":"#7a68a0",
  cursor:"pointer",fontSize:11,letterSpacing:"0.14em",
  fontFamily:"'Palatino Linotype',Palatino,Georgia,serif",
  borderRadius:2,
  boxShadow:t==="pri"?"0 2px 12px rgba(139,26,42,0.25),inset 0 1px 0 rgba(232,192,96,0.15)":"0 1px 4px rgba(30,16,56,0.08)",
  fontWeight:t==="pri"?600:400,
  textTransform:"uppercase",
});

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
