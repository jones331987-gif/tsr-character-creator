const dieValue = (d) => { const m={d4:4,d6:6,d8:8,d10:10,d12:12}; if(m[d])return m[d]; if(d.startsWith("d12+"))return 12+parseInt(d.slice(4)); return 4; };
// Vigor tier: 0 at d4, +1 per step. Each tier grants +5 HP and +5 Damage Shield cap.
const vigorTier     = (vig) => STAT_CHAIN.indexOf(vig);

const calcParry     = (dex) => Math.floor(dieValue(dex)/2)+2;
// Ward = half WIL − 2 (minimum 0). Mind does NOT affect Ward per the rules.
const calcWard      = (wil) => Math.max(0,Math.floor(dieValue(wil)/2)-2);
// Armor = half VIG − 2 (minimum 0)
const calcArmor     = (vig) => Math.max(0,Math.floor((dieValue(vig)-2)/2));

const calcVigorHP   = (vig) => vigorTier(vig) * 5;
// Damage Shield cap: +5 per tier above d4 (0 at d4)
const calcDmgShield = (vig) => vigorTier(vig) * 5;
// Spell Range: base 2 + tiers above d4 for Mind + tiers above d4 for Willpower
const calcSpellRange = (mind, wil) => 2 + STAT_CHAIN.indexOf(mind) + STAT_CHAIN.indexOf(wil);
// Size bonuses per size above 1: +1 Armor, +1 Primary Damage, −1 Parry. Size 2+ grants +1 Reach.

const TIER_SILVER = {novice:50, adept:100, master:150};

// ─── STAT BONUS CALC ─────────────────────────────────────────────────────────
// Compute training bonuses ONLY from explicitly purchased trainings
function getTrainingBonuses(purchasedTrainings) {
  // purchasedTrainings: Set of "skillId:tier" strings
  let bonuses = {HP:0, Stamina:0, Mana:0, Parry:0, PhysRes:0, PrimDmg:0, Acc:0};
  for(const tree of SKILL_TREES) {
    const tiers = ["novice","adept","master"];
    for(const tier of tiers) {
      if(!purchasedTrainings.has(`${tree.id}:${tier}`)) continue;
      const training = tree.tiers[tier].training;
      if(!training) continue;
      if(training.effect === "statBonus") {
        bonuses[training.key] = (bonuses[training.key]||0) + training.value;
      }
      if(training.bonus) {
        if(training.bonus.includes("Primary Damage") && training.bonus.includes("Accuracy")) {
          bonuses.PrimDmg += 1; bonuses.Acc += 1;
        }
        if(training.bonus.includes("Parry") && training.bonus.includes("Physical Resistance")) {
          bonuses.Parry += 1; bonuses.PhysRes += 1;
        }
      }
    }
  }
  return bonuses;
}

// Compute total silver spent on skills (trainings + techniques)
function calcSkillSilverSpent(skills, purchasedTrainings, techniques) {
  let total = 0;
  const tierList = ["novice","adept","master"];
  for(const tree of SKILL_TREES) {
    // Build set of spell/feat names granted FREE by master perks in this tree
    const freeGrantNames = new Set();
    for(const perk of (tree.masterPerks||[])) {
      if(perk.autoSpell) freeGrantNames.add(perk.autoSpell.name);
    }
    for(let ti=0; ti<3; ti++) {
      const tier = tierList[ti];
      const silverCost = TIER_SILVER[tier];
      // Training cost
      if(purchasedTrainings.has(`${tree.id}:${tier}`)) total += silverCost;
      // Techniques/spells cost — skip auto-granted spells (free from master perks)
      const techs = ((techniques[tree.id]||{})[tier])||[];
      for(const techName of techs) {
        if(freeGrantNames.has(techName)) continue; // free — granted by master perk
        total += silverCost;
      }
    }
  }
  return total;
}


// ─── TECHNIQUE SLOT HELPERS ──────────────────────────────────────────────────
// Per combat guide: Novice=2 slots, Adept=3 slots, Master=4 slots
// Trainings cost no slots (always on). Passives are always on once purchased.
const TIER_SLOT_COST = {novice:2, adept:3, master:4};

const isPassiveTech = (cost) => {
  const c = cost.toLowerCase();
  return c.startsWith("passive") || c === "free action";
};

// Get which tier a technique belongs to for a given skill tree
const getTechTier = (skillId, techName) => {
  const tree = SKILL_TREES.find(t=>t.id===skillId);
  if(!tree) return null;
  for(const tier of ["novice","adept","master"]) {
    const techs = tree.tiers[tier]?.techniques || [];
    if(techs.some(t=>t.name===techName)) return tier;
  }
  return null;
};

// Slot cost for a technique = its tier cost
const techSlotCost = (skillId, techName) => {
  const tier = getTechTier(skillId, techName);
  return tier ? TIER_SLOT_COST[tier] : 2;
};

// Total bonus technique slots from purchased trainings
// +5 per training tier purchased for that skill (max +15 per skill, but global pool)
const calcBonusTechSlots = (purchasedTrainings) => {
  let bonus = 0;
  for(const tree of SKILL_TREES) {
    if(tree.type !== "physical") continue;
    for(const tier of ["novice","adept","master"]) {
      if(purchasedTrainings.has(`${tree.id}:${tier}`)) bonus += 5;
    }
  }
  return bonus;
};

      SAVE_SLOTS.forEach(slot=>{
        const raw = localStorage.getItem("tsr_"+slot);
        loaded[slot] = raw ? JSON.parse(raw) : null;
      });
      setSaves(loaded);
    } catch(e){}
  }, []);

  const saveToSlot = (slot, i) => {
    const existing = saves[slot];
    const doSave = () => {
      try {
        const data = charToJSON(char);
        localStorage.setItem("tsr_"+slot, JSON.stringify(data));
        setSaves(s=>({...s,[slot]:data}));
        flash(`Saved to Slot ${i+1}!`);
      } catch(e){ flash("Save failed."); }
    };
    if(existing && existing.name) {
      confirm(`Overwrite "${existing.name}" in Slot ${i+1}?`, doSave);
    } else {
      doSave();
    }
  };

  const loadFromSlot = (slot) => {
    try {
      const raw = localStorage.getItem("tsr_"+slot);
      if(!raw) return;
      setChar(charFromJSON(JSON.parse(raw)));
      setStep(0);
      flash(`Loaded!`);
    } catch(e){ flash("Load failed."); }
  };

  const deleteSlot = (slot, i) => {
    confirm(`Clear Slot ${i+1}? This cannot be undone.`, () => {
      localStorage.removeItem("tsr_"+slot);
      setSaves(s=>({...s,[slot]:null}));
      flash("Slot cleared.");
    });
  };

  const [jsonModal, setJsonModal] = useState(null);
  const [importText, setImportText] = useState("");

  const exportChar = () => {
    const txt = JSON.stringify(charToJSON(char), null, 2);
    const a = document.createElement("a");
    a.href = "data:text/plain;charset=utf-8," + encodeURIComponent(txt);
    a.download = `${(char.name||"character").replace(/\s+/g,"_")}_tsr5.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };

  const importChar = () => {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".txt,.json";
    document.body.appendChild(input);
    input.onchange = (e) => {
      const file = e.target.files[0];
      document.body.removeChild(input);
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const obj = JSON.parse(ev.target.result);
          setChar(charFromJSON(obj));
          setStep(0);
          flash("Character imported!");
        } catch(err){ flash("Import failed — invalid file."); }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  const doImport = () => {
    try {
      const obj = JSON.parse(importText);
      setChar(charFromJSON(obj));
      setStep(0);
      setJsonModal(null);
      setImportText("");
      flash("Character imported!");
    } catch(err){ flash("Import failed — check the text is valid."); }
  };

  const newChar = () => {
    confirm("Start a new character? Unsaved progress will be lost.", () => {
      setChar({...EMPTY_CHAR, purchasedTrainings: new Set()});
      setStep(0);
    });
  };

  const flash = (msg) => { setSaveMsg(msg); setTimeout(()=>setSaveMsg(""),2500); };

  const setC = (field, val) => {
    if(field === "boon") {
      setChar(c => {
        const base = {...c, boon: val};
        // Vow of Ash: lock Mana to 0, refund any spent Mana points
        if(val?.name === "Vow of Ash") {
          const manaSpent = c.attrs.Mana - 0;
          return {...base, attrs:{...c.attrs, Mana:0}, attrPointsUsed: c.attrPointsUsed - manaSpent};
        }
        // Rite of Embers: lock Stamina to 10, refund any extra Stamina points
        if(val?.name === "Rite of Embers") {
          const staminaSpent = c.attrs.Stamina - 10;
          return {...base, attrs:{...c.attrs, Stamina:10}, attrPointsUsed: c.attrPointsUsed - staminaSpent};
        }
        // Gigantic: STR & VIG floor to d6, size becomes 2
        if(val?.name === "Gigantic") {
          const newStats = {...c.stats};
          if(STAT_CHAIN.indexOf(newStats.Strength) < 1) newStats.Strength = "d6";
          if(STAT_CHAIN.indexOf(newStats.Vigor)    < 1) newStats.Vigor    = "d6";
          return {...base, stats: newStats, size: 2};
        }
        // Switching away from Gigantic — reset STR/VIG if they were only at d6 minimum, restore size 1
        if(c.boon?.name === "Gigantic") {
          const newStats = {...c.stats};
          if(newStats.Strength === "d6") newStats.Strength = "d4";
          if(newStats.Vigor    === "d6") newStats.Vigor    = "d4";
          return {...base, stats: newStats, size: 1};
        }
        return base;
      });
    } else {
      setChar(c=>({...c,[field]:val}));
    }
  };

  const trainBonuses = getTrainingBonuses(char.purchasedTrainings);

  // Slotted technique persistent bonuses
  const slottedTechBonuses = (() => {
    const b = {HP:0,Stamina:0,Mana:0,Parry:0,PhysRes:0,PrimDmg:0,Acc:0};
    (char.slottedTechniques||new Set()).forEach(key => {
      // key format: "skillId||techName"
      const techName = key.split("||")[1];
      const bonus = SLOTTED_BONUS_TECHS[techName];
      if(bonus) Object.entries(bonus).forEach(([k,v]) => { b[k] = (b[k]||0) + v; });
    });
    return b;
  })();

  // (slot budget calculated below after finalStamina)

  const skillSilverSpent = calcSkillSilverSpent(char.skills, char.purchasedTrainings, char.techniques);

  // stat point budget — Gigantic gets STR & VIG d6 free (they're mandatory minimums)
  // stUsed = total stats spent minus free gigantic points minus level-up stats spent separately
  const stUsed = statPointsUsed(char.stats) - (char.boon?.name==="Gigantic" ? 2 : 0) - (char.levelStatPointsSpent||0);
  const stLeft = 6 - stUsed;

  // attribute budget — attrPointsUsed tracks ALL spending (base + level-up combined)
  // apLeft = base budget + unspent level points - base-only spending
  const boonAP = char.boon?.name==="History of Discipline" ? 10 : 0;
  const totalAP = 20 + boonAP;
  const apLeft = totalAP - char.attrPointsUsed + (char.levelAttrPoints||0);

  // skill point budget — subtract level-up skills from total used
  const boonSP = char.boon?.name==="History of Discipline" ? 2 : 0;
  const totalSP = 3 + boonSP;
  const spUsed = Object.values(char.skills).reduce((t,v)=>t+v,0) - (char.levelSkillPointsSpent||0);
  const spLeft = totalSP - spUsed;

  // derived stats with bonuses
  const size         = char.size || 1;
  const sizeB        = calcSizeBonus(size);
  const vigorHPBonus  = calcVigorHP(char.stats.Vigor);
  const finalHP       = char.attrs.HP + trainBonuses.HP + vigorHPBonus;
  const finalStamina  = char.attrs.Stamina + trainBonuses.Stamina;
  // Technique slot budget (needs finalStamina)
  const bonusTechSlots = calcBonusTechSlots(char.purchasedTrainings);
  const totalTechSlots = finalStamina + bonusTechSlots;
  const slotsUsed = (() => {
    let used = 0;
    (char.slottedTechniques||new Set()).forEach(key => {
      const [skillId, techName] = key.split("||");
      used += techSlotCost(skillId, techName);
    });
    return used;
  })();
  // ── Master Perk helper (needed for manaPlus5 below) ──────────────────────
  const hasPerk = (skillId, perkName) => {
    const val = char.masterPerks[skillId];
    if(!val) return false;
    const arr = Array.isArray(val) ? val : [val];
    return arr.includes(perkName);
  };
  // Mana +5 perks (must be computed before finalMana)
  const manaPlus5 =
    (hasPerk("spellcrafting","Blessing of Mana") ? 5 : 0) +
    (hasPerk("anima","Energy") ? 5 : 0) +
    (hasPerk("void","Arcane Spirit") ? 5 : 0) +
    (hasPerk("holy","Holy Might") ? 5 : 0) +
    (hasPerk("dark","Sorcerer") ? 5 : 0) +
    (hasPerk("figment","Shadow Thief") ? 5 : 0) +
    (hasPerk("thaumaturgy","Thaumic Battery") ? 5 : 0) +
    (hasPerk("nature","Druidcraft") ? 5 : 0);
  const finalMana     = char.attrs.Mana + (trainBonuses.Mana||0) + manaPlus5;
  // Spell slot budget (needs finalMana)
  const bonusSpellSlots = calcBonusSpellSlots(char.purchasedTrainings);
  const totalSpellSlots = finalMana + bonusSpellSlots;
  const spellSlotsUsed = (() => {
    let used = 0;
    // Build set of auto-spell keys (granted by master perks, no slot cost)
    const autoKeys = new Set();
    for(const tree of SKILL_TREES) {
      const perks = Array.isArray(char.masterPerks[tree.id]) ? char.masterPerks[tree.id] : char.masterPerks[tree.id] ? [char.masterPerks[tree.id]] : [];
      for(const perkName of perks) {
        const perkDef = (tree.masterPerks||[]).find(p=>p.name===perkName);
        if(perkDef?.autoSpell) autoKeys.add(`${tree.id}||${perkDef.autoSpell.name}`);
      }
    }
    (char.slottedSpells||new Set()).forEach(key => {
      if(autoKeys.has(key)) return; // auto-spells cost no slots
      const [skillId, spellName] = key.split("||");
      const tree = SKILL_TREES.find(t=>t.id===skillId);
      if(!tree) return;
      for(const tier of ["novice","adept","master"]) {
        if((tree.tiers[tier]?.techniques||[]).some(t=>t.name===spellName)) {
          used += TIER_SLOT_COST[tier]; return;
        }
      }
      used += 2;
    });
    return used;
  })();
  const finalDmgShield= calcDmgShield(char.stats.Vigor);
  const baseParry     = calcParry(char.stats.Dexterity);
  const armorParryB   = char.equipment.armor?.parry||0;
  const shieldParryB  = (char.equipment.offhand?.parry)||0;
  // Weapon Parry+N from props (e.g. Staff Parry+1) — both main hand and off-hand weapons
  const parseIntProp  = (propsStr, key) => { const m = (propsStr||"").match(new RegExp(key+"\\+(\\d+)")); return m ? parseInt(m[1]) : 0; };
  const parseIntPropNeg = (propsStr, key) => { const m = (propsStr||"").match(new RegExp(key+"-(\\d+)")); return m ? -parseInt(m[1]) : 0; };
  const weaponParryB  = parseIntProp(char.equipment.weapon?.props, "Parry")
                      + parseIntProp(char.equipment.offhand?.props, "Parry");
  const finalParry    = baseParry + armorParryB + shieldParryB + weaponParryB + trainBonuses.Parry + slottedTechBonuses.Parry + (char.boon?.name==="Blessing of Power"?1:0) + sizeB.parry;

  // Reach — base 1 + weapon Reach+N props (largest of main/off-hand, not additive) + size
  const weaponReachB  = Math.max(
    parseIntProp(char.equipment.weapon?.props, "Reach"),
    parseIntProp(char.equipment.offhand?.props, "Reach")
  );
  const finalReach    = 1 + weaponReachB + sizeB.reach;

  // Movement Speed — base 6 + tech bonuses + armor bonus + armor Move penalty
  const maTechs = Object.values(char.techniques["martial_arts"]||{}).flat();
  const moveTechBonus = maTechs.includes("Disciplined Movement") ? 2 : maTechs.includes("Improved Movement") ? 1 : 0;
  const armorMoveBonus  = parseIntProp(char.equipment.armor?.bonus, "Move");
  const armorMovePenalty= parseIntPropNeg(char.equipment.armor?.bonus, "Move");
  const finalMove = 6 + moveTechBonus + armorMoveBonus + armorMovePenalty;

  // Ward — base + boon + jewelry Ward bonus
  const jewelryWardBonus = char.equipment.jewelry.reduce((t,j) => {
    const m = j.bonus?.match(/Ward\+(\d+)/); return t + (m ? parseInt(m[1]) : 0);
  }, 0);
  const finalWard     = calcWard(char.stats.Willpower) + (char.boon?.name==="Blessing of Power"?1:0) + jewelryWardBonus;

  const armorBonus    = char.equipment.armor?.armor||0;
  // Machine Armor: Size+1 from armor bonus field
  const armorSizeBonus = parseIntProp(char.equipment.armor?.bonus, "Size");
  const finalArmor    = calcArmor(char.stats.Vigor) + armorBonus + sizeB.armor;
  const finalSpellRange = calcSpellRange(char.stats.Mind, char.stats.Willpower);

  // Crit bonus — from weapon props (Crit+N), off-hand weapon, and Demon rune
  const weaponCritBonus = (() => {
    const w = char.equipment.weapon;
    let c = parseIntProp(w?.props, "Crit");
    // Demon rune grants Crit+1
    if(char.weaponRune === "Demon") c += 1;
    return c;
  })();
  const offhandCritBonus = parseIntProp(char.equipment.offhand?.props, "Crit");
  // Jewelry Spell Power bonus
  const jewelrySpellPowerBonus = char.equipment.jewelry.reduce((t,j) => {
    const m = j.bonus?.match(/Spell Power\+(\d+)/); return t + (m ? parseInt(m[1]) : 0);
  }, 0);

  // Weapon bonuses (parse Acc+N and Dmg+N from props string)
  const weaponAccBonus = (() => {
    const w = char.equipment.weapon;
    const base = w?.props?.match(/Acc\+(\d+)/);
    let bonus = base ? parseInt(base[1]) : 0;
    // Mithril Silver: +1 Acc (non-gun only)
    if(char.weaponMithril && w && !(w.props||"").includes("Gun")) bonus += 1;
    // Gun mod: Scope +2 Acc
    if((char.weaponMods||[]).includes("Scope")) bonus += 2;
    // Demon rune: Accuracy+2
    if(char.weaponRune === "Demon") bonus += 2;
    return bonus;
  })();
  const weaponDmgBonus = (() => {
    const w = char.equipment.weapon;
    const base = w?.props?.match(/Dmg\+(\d+)/);
    let bonus = base ? parseInt(base[1]) : 0;
    // Mithril Silver: +1 Dmg (non-gun only)
    if(char.weaponMithril && w && !(w.props||"").includes("Gun")) bonus += 1;
    // Demon rune: Dmg+3
    if(char.weaponRune === "Demon") bonus += 3;
    return bonus;
  })();
  const gunModRangeBonus = (char.weaponMods||[]).includes("Long Barrel") ? 4 : 0;
  const jewelryAccBonus = char.equipment.jewelry.reduce((t,j) => {
    const m = j.bonus?.match(/Accuracy\+(\d+)/); return t + (m ? parseInt(m[1]) : 0);
  }, 0);
  const jewelryDmgBonus = char.equipment.jewelry.reduce((t,j) => {
    const m = j.bonus?.match(/Primary Damage\+(\d+)/); return t + (m ? parseInt(m[1]) : 0);
  }, 0);
  const boonOffensive = char.boon?.name==="Blessing of Power" ? 1 : 0;

  // ── Passive On-Hit Effects ───────────────────────────────────────────────
  // Returns a list of always-on effect strings derived from perks, techniques, equipment
  const passiveOnHitEffects = (() => {
    const fx = [];
    const allTechs = (skillId) => Object.values(char.techniques[skillId]||{}).flat();
    const hasTech = (skillId, name) => allTechs(skillId).includes(name);
    const perkIs = (skillId, name) => {
      const v = char.masterPerks[skillId];
      return Array.isArray(v) ? v.includes(name) : v === name;
    };

    // CQC master perks
    if(perkIs("cqc","Lethality"))       fx.push("Lethality: melee HP dmg → 2 Bleed (Aggravate on crit)");
    if(perkIs("cqc","Crush Armor"))     fx.push("Crush Armor: 1st melee attack AP=½STR; crits apply Rend");
    // Endurance master perk - conditional bonus
    if(perkIs("endurance","Punishing Draw")) fx.push("Punishing Draw: +2 Acc & Dmg on first attack when initiating combat");
    // Marksmanship master perks
    if(perkIs("marksmanship","Barbed Shots")) fx.push("Barbed Shots: ranged HP dmg → 2 Bleed (Aggravate on crit)");
    // Savagery weapon enchants (only highest applies)
    if(hasTech("savagery","Crimson Steel"))    fx.push("Crimson Steel: weapon HP dmg → 3 Bleed");
    else if(hasTech("savagery","Sanguine Edge")) fx.push("Sanguine Edge: weapon HP dmg → 2 Bleed");
    else if(hasTech("savagery","Red Rust"))    fx.push("Red Rust: weapon HP dmg → 1 Bleed");
    // Tactics training passives
    const hasTacAdept  = char.purchasedTrainings.has("tactics:adept");
    const hasTacMaster = char.purchasedTrainings.has("tactics:master");
    if(hasTacAdept)  fx.push("Tactics Adept: CC landing inflicts Rend");
    if(hasTacMaster) fx.push("Tactics Master: CC landing deals STR dmg to Stamina");
    // Catalyst on-hit props
    const cat = char.equipment.catalyst;
    if(cat?.props) {
      const catProps = cat.props;
      if(catProps.includes("Searing"))       fx.push(`Catalyst: ${cat.name} — ${catProps.match(/Searing\(\d+\)/)?.[0]||"Searing"}`);
      if(catProps.includes("Stamina Drain")) fx.push(`Catalyst: ${cat.name} — Stamina Drain`);
      if(catProps.includes("Health Drain"))  fx.push(`Catalyst: ${cat.name} — Health Drain`);
      if(catProps.includes("Cloak"))         fx.push(`Catalyst: ${cat.name} — Cloak(5ft) AoE`);
    }
    // Weapon props
    const wpn = char.equipment.weapon;
    if(wpn?.props) {
      if(wpn.props.includes("Deadly"))    fx.push(`${wpn.name}: Deadly (crits deal max dmg)`);
      const apMatch = wpn.props.match(/AP (\d+)/);
      if(apMatch) fx.push(`${wpn.name}: AP ${apMatch[1]} (ignores ${apMatch[1]} Armor)`);
    }
    // Alchemical poison applied to weapon
    if((char.equipment.items||[]).some(i=>i.name==="Poison")) fx.push("Poison (item): apply Poison(4) to weapon for 2 rounds");

    return fx;
  })();

  // Brute: STR replaces DEX for melee accuracy
  const hasBrute = hasPerk("cqc", "Brute");
  // Eagle Eye: DEX replaces STR for ranged damage
  const hasEagleEye = hasPerk("marksmanship", "Eagle Eye");
  // Primal Mass: VIG replaces STR for melee damage
  const hasPrimalMass = hasPerk("savagery", "Primal Mass");
  // Punishing Draw: +2 Acc & Dmg on initiating attack (show as flat bonus on sheet)
  const hasPunishingDraw = hasPerk("endurance", "Punishing Draw");


  // Savage Fighting: Parry bonuses from Unarmored techniques also add to Primary Damage
  const hasSavageFighting = (() => {
    const perks = char.masterPerks["savagery"];
    if(!perks) return false;
    const arr = Array.isArray(perks) ? perks : [perks];
    return arr.includes("Savage Fighting");
  })();
  const isUnarmored = !char.equipment.armor || char.equipment.armor.name === "Clothes";
  const unarmoredParryBonus = (() => {
    if(!isUnarmored) return 0;
    const savTechs = char.techniques["savagery"] || {};
    const allTechs = Object.values(savTechs).flat();
    if(allTechs.includes("Raging Barbarism")) return 3;
    if(allTechs.includes("Barbarism")) return 2;
    if(allTechs.includes("Crude Barbarism")) return 1;
    // Also check Martial Arts unarmored styles
    const maTechs = Object.values(char.techniques["martial_arts"] || {}).flat();
    if(maTechs.includes("Perfected Unarmored Style")) return 3;
    if(maTechs.includes("Unarmored Style")) return 2;
    if(maTechs.includes("Crude Unarmored Style")) return 1;
    return 0;
  })();
  const savageFightingBonus = hasSavageFighting ? unarmoredParryBonus : 0;

  const accBonus  = trainBonuses.Acc + slottedTechBonuses.Acc + boonOffensive + weaponAccBonus + jewelryAccBonus;
  const dmgBonus  = trainBonuses.PrimDmg + slottedTechBonuses.PrimDmg + boonOffensive + weaponDmgBonus + jewelryDmgBonus + sizeB.primDmg + savageFightingBonus;
  // Brute: use STR for melee accuracy die. Eagle Eye: use DEX for ranged dmg die. Primal Mass: use VIG for melee dmg die.
  const meleeAccDie = hasBrute ? char.stats.Strength : char.stats.Dexterity;
  const meleeDmgDie = hasPrimalMass ? char.stats.Vigor : char.stats.Strength;
  const finalMeleeAcc = { die: meleeAccDie, bonus: accBonus };
  const finalMeleeDmg = { die: meleeDmgDie, bonus: dmgBonus };
  // Spell attack: Accuracy = Mind die. Spell Power = Mind die + spell's own dice (spell dice shown at cast time).
  // Blessing of Power grants +1 to Spell Power via Primary Damage bonus.
  const finalSpellAcc = { die: char.stats.Mind };
  const finalSpellPower = { die: char.stats.Mind, bonus: boonOffensive };

  // Helper: does the equipped weapon have the Gun property?
  const isGunWeapon = (w) => w && (w.props||"").includes("Gun");
  const isSimpleGun = (w) => {
    if(!isGunWeapon(w)) return false;
    // Simple Ranged guns
    const simpleNames = ["Pistol","Musket","Boomstick","Autogun"];
    return simpleNames.includes(w.name);
  };
  const equippedGunModSlots = (w) => {
    if(!isGunWeapon(w)) return 0;
    if(w.name==="Lasgun") return 1;
    if(isSimpleGun(w)) return 1;
    return 2; // Marksman guns
  };

  // Weapon add-on silver costs (main hand + off-hand)
  const weaponAddonCost = (() => {
    let total = 0;
    // Main hand
    if(char.weaponRune) { const r=WEAPON_RUNES_DATA.find(x=>x.name===char.weaponRune); if(r&&!r.special) total+=r.cost; }
    if(char.weaponSpell) { const s=WEAPON_SPELLS_DATA.find(x=>x.name===char.weaponSpell); if(s) total+=s.cost; }
    if(char.weaponMithril && char.equipment.weapon) total+=MITHRIL_WEAPON_COST(getWeaponHandedness(char.equipment.weapon));
    for(const m of (char.weaponMods||[])) { const md=GUN_MODS_DATA.find(x=>x.name===m); if(md) total+=md.cost; }
    // Off-hand
    if(char.offhandRune) { const r=WEAPON_RUNES_DATA.find(x=>x.name===char.offhandRune); if(r&&!r.special) total+=r.cost; }
    if(char.offhandSpell) { const s=WEAPON_SPELLS_DATA.find(x=>x.name===char.offhandSpell); if(s) total+=s.cost; }
    if(char.offhandMithril && char.equipment.offhand) total+=MITHRIL_WEAPON_COST(getWeaponHandedness(char.equipment.offhand));
    for(const m of (char.offhandMods||[])) { const md=GUN_MODS_DATA.find(x=>x.name===m); if(md) total+=md.cost; }
    return total;
  })();

  // equipment + skill money
  const moneySpent = [
    char.equipment.weapon?.cost||0,
    char.equipment.offhand?.cost||0,
    char.equipment.armor?.cost||0,
    char.equipment.catalyst?.cost||0,
    ...char.equipment.items.map(i=>i.cost),
    ...char.equipment.jewelry.map(j=>j.cost),
    weaponAddonCost,
  ].reduce((a,b)=>a+b,0);
  const moneyLeft = char.money - moneySpent - skillSilverSpent;

  const canContinue = () => {
    if(step===0) return char.name.trim().length>0;
    if(step===1) return char.role!=="";
    if(step===2) return char.boon!==null;
    if(step===3) return stLeft>=0 && apLeft>=0;
    if(step===4) return spLeft>=0;
    return true;
  };

  const gunModAmmoBonus = (char.weaponMods||[]).includes("Extended Magazine") ? 6 : 0;
  const derived = {finalHP,finalStamina,finalMana,finalParry,finalWard,finalArmor,finalDmgShield,finalSpellRange,finalMeleeAcc,finalMeleeDmg,finalSpellAcc,finalSpellPower,finalReach,size,sizeB,trainBonuses,moneyLeft,dmgBonus,hasBrute,hasEagleEye,hasPrimalMass,hasPunishingDraw,meleeDmgDie,passiveOnHitEffects,finalMove,slottedTechBonuses,totalTechSlots,slotsUsed,bonusTechSlots,totalSpellSlots,spellSlotsUsed,bonusSpellSlots,gunModRangeBonus,gunModAmmoBonus,jewelryAccBonus,jewelryDmgBonus,savageFightingBonus,boonOffensive,weaponCritBonus,offhandCritBonus,jewelryWardBonus,jewelrySpellPowerBonus,armorSizeBonus,weaponParryB,weaponReachB};

  return (
    <div style={{minHeight:"100vh",background:"var(--bg-page-grad)",color:"var(--text-body)",fontFamily:"'Palatino Linotype',Palatino,Georgia,serif",display:"flex",flexDirection:"column"}}>

        <div style={{width:46,height:46,borderRadius:"50%",background:"linear-gradient(135deg,#2e1a52,#1e1038)",border:"1px solid rgba(76,200,224,0.4)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:"0 0 14px rgba(76,200,224,0.2)",position:"relative"}}>
          <div style={{position:"absolute",inset:4,borderRadius:"50%",border:"1px solid rgba(76,200,224,0.2)"}}/>
          <span style={{fontSize:20,filter:"drop-shadow(0 0 5px rgba(76,200,224,0.6))"}}>⚙</span>
        </div>
        <div>
          <div style={{fontSize:22,fontWeight:700,letterSpacing:"0.22em",background:"linear-gradient(135deg,#c8a84a,#edd880,#b89030,#f0d870)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>TSR 5.0</div>
          <div style={{fontSize:9,color:"#9a88c0",letterSpacing:"0.4em",marginTop:2}}>IMPERIAL REGISTRY · CITIZEN DOSSIER</div>
        </div>
        <div style={{flex:1,height:1,background:"linear-gradient(90deg,transparent,rgba(76,200,224,0.25),transparent)",margin:"0 8px"}}/>
        {char.name&&<div style={{textAlign:"right"}}>
          <div style={{fontSize:9,color:"#9a88c0",letterSpacing:"0.2em",marginBottom:2}}>REGISTERED SUBJECT</div>
          <div style={{fontSize:13,color:"#c8a84a",fontStyle:"italic",letterSpacing:"0.06em"}}>✦ {char.name}</div>
        </div>}
        <div style={{width:1,height:30,background:"rgba(76,200,224,0.2)",margin:"0 4px"}}/>
        <button onClick={()=>setDarkMode(d=>!d)} title={darkMode?"Switch to Light Mode":"Switch to Dark Mode"} style={{
          background: darkMode ? "rgba(76,200,224,0.12)" : "rgba(200,168,74,0.12)",
          border: darkMode ? "1px solid rgba(76,200,224,0.4)" : "1px solid rgba(200,168,74,0.4)",
          borderRadius:20, padding:"6px 12px", cursor:"pointer",
          display:"flex", alignItems:"center", gap:6,
          color: darkMode ? "#4cc8e0" : "#c8a84a",
          fontSize:11, fontFamily:"inherit", letterSpacing:"0.05em",
          transition:"all 0.25s ease",
        }}>
          <span style={{fontSize:14}}>{darkMode ? "☀" : "🌙"}</span>
          <span>{darkMode ? "Light" : "Dark"}</span>
        </button>
        <div style={{width:1,height:30,background:"rgba(76,200,224,0.2)",margin:"0 4px"}}/>
        <div style={{textAlign:"right",opacity:0.7}}>
          <div style={{fontSize:8,color:"#4cc8e0",letterSpacing:"0.2em"}}>CLEARANCE</div>
          <div style={{fontSize:10,color:"var(--text-danger)",letterSpacing:"0.1em",fontWeight:700}}>LEVEL I</div>
        </div>
      </header>

      {/* ── Character Manager bar ── */}
      <div style={{borderBottom:"1px solid var(--border-nav)",background:"var(--bg-toolbar)",backdropFilter:"blur(4px)",padding:"6px 16px",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <span style={{fontSize:9,color:"var(--text-row-label)",letterSpacing:"0.15em",marginRight:4}}>CHARACTER:</span>

        <div style={{width:1,height:16,background:"var(--border-main)",margin:"0 4px"}}/>

            <div key={slot} style={{display:"flex",gap:3,alignItems:"center"}}>

            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={()=>setConfirmModal(null)} style={btnS("sec")}>Cancel</button>
              <button onClick={()=>{confirmModal.onConfirm();setConfirmModal(null);}} style={btnS("pri")}>Confirm</button>
            </div>
          </div>
        </div>

      {/* ── JSON Export/Import Modal ── */}
      {jsonModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(30,16,56,0.7)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}} onClick={()=>setJsonModal(null)}>
          <div style={{background:"var(--bg-modal)",border:"2px solid var(--border-modal)",borderRadius:4,padding:28,width:"min(560px,95vw)",maxHeight:"80vh",display:"flex",flexDirection:"column",gap:14,boxShadow:"0 8px 40px rgba(30,16,56,0.4)"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:13,fontWeight:700,color:"var(--text-head)",letterSpacing:"0.1em"}}>
              {jsonModal==="export"?"↓ EXPORT CHARACTER":"↑ IMPORT CHARACTER"}
            </div>
            {jsonModal==="export"&&(
              <>
                <div style={{fontSize:11,color:"var(--text-row-label)"}}>Copy the text below and save it to a <code>.json</code> file, or paste it directly into the Import box on another device.</div>
                <textarea id="tsr-export-ta" readOnly value={JSON.stringify(charToJSON(char),null,2)} style={{flex:1,minHeight:220,fontFamily:"monospace",fontSize:10,background:"var(--bg-input)",border:"1px solid var(--border-main)",borderRadius:2,padding:10,color:"var(--text-body)",resize:"vertical"}} onClick={e=>e.target.select()}/>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{
                    const ta=document.querySelector("#tsr-export-ta");
                    if(ta){ta.select();document.execCommand("copy");}
                    else{try{navigator.clipboard.writeText(JSON.stringify(charToJSON(char),null,2));}catch(e){}}
                    flash("Copied to clipboard!");
                  }} style={{...btnS("pri"),flex:1}}>📋 Copy to Clipboard</button>
                  <button onClick={()=>setJsonModal(null)} style={{...btnS("sec")}}>Close</button>
                </div>
              </>
            )}
            {jsonModal==="import"&&(
              <>
                <div style={{fontSize:11,color:"var(--text-row-label)"}}>Paste your exported character JSON below, then click Import.</div>
                <textarea value={importText} onChange={e=>setImportText(e.target.value)} placeholder='Paste JSON here...' style={{flex:1,minHeight:220,fontFamily:"monospace",fontSize:10,background:"var(--bg-input)",border:"1px solid var(--border-main)",borderRadius:2,padding:10,color:"var(--text-body)",resize:"vertical"}}/>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={doImport} disabled={!importText.trim()} style={{...btnS("pri"),flex:1,opacity:importText.trim()?1:0.5}}>↑ Import Character</button>
                  <button onClick={()=>setJsonModal(null)} style={{...btnS("sec")}}>Cancel</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── STEP COMPONENTS ─────────────────────────────────────────────────────────
function StepIdentity({char,setC}){
  return(
    <div>
      <ST>Who Are You?</ST>
      <p style={sub}>Fill in your character's basic details for the Social Character Sheet.</p>
      <div style={{display:"grid",gridTemplateColumns:"180px 1fr",gap:24,marginTop:20,alignItems:"start"}}>
        {/* Portrait upload */}
        <div>
          <Lbl>Character Art</Lbl>
          <div
            onClick={()=>document.getElementById("portrait-upload").click()}
            style={{
              width:180,height:220,border:"2px dashed #c8b8e0",borderRadius:4,
              background:"var(--bg-panel)",cursor:"pointer",
              display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
              overflow:"hidden",position:"relative",transition:"border-color 0.2s",
            }}
            onMouseEnter={e=>e.currentTarget.style.borderColor="#4cc8e0"}
            onMouseLeave={e=>e.currentTarget.style.borderColor="var(--text-head)"}
          >
            {char.portrait
              ? <img src={char.portrait} alt="Character portrait" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              : <>
                  <div style={{fontSize:32,marginBottom:8,color:"var(--text-head)"}}>🖼</div>
                  <div style={{fontSize:10,color:"var(--text-label)",textAlign:"center",padding:"0 12px",lineHeight:1.5}}>Click to upload character art</div>
                </>
            }
            {char.portrait&&(
              <div style={{position:"absolute",inset:0,background:"var(--bg-portrait-hover)",display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.2s"}}
                onMouseEnter={e=>e.currentTarget.style.background="var(--bg-portrait-hover)"}
                onMouseLeave={e=>e.currentTarget.style.background="var(--bg-portrait-hover)"}
              >
                <span style={{color:"white",fontSize:10,letterSpacing:"0.1em",opacity:0,transition:"opacity 0.2s"}}
                  onMouseEnter={e=>e.currentTarget.style.opacity=1}
                  onMouseLeave={e=>e.currentTarget.style.opacity=0}
                >CHANGE</span>
              </div>
            )}
          </div>
          <input id="portrait-upload" type="file" accept="image/*" style={{display:"none"}}
            onChange={e=>{
              const file=e.target.files[0];
              if(!file) return;
              const reader=new FileReader();
              reader.onload=ev=>setC("portrait",ev.target.result);
              reader.readAsDataURL(file);
              e.target.value="";
            }}
          />
          {char.portrait&&(
            <button onClick={()=>setC("portrait",null)} style={{...mic,marginTop:6,width:"100%",color:"#8b1a2a",border:"1px solid #e0b0b8",background:"rgba(139,26,42,0.04)"}}>✕ Remove</button>
          )}
        </div>

        {/* Text fields */}
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18}}>
            {[["Character Name *","name","e.g. Zora Aelia"],["Race","race","Human, Vanir, Vampire…"],["Age","age","e.g. 24"],["Location","location","Where do they live?"]].map(([label,key,ph])=>(
              <div key={key}>
                <Lbl>{label}</Lbl>
                <input style={inp} value={char[key]||""} onChange={e=>setC(key,e.target.value)} placeholder={ph}/>
              </div>
            ))}
          </div>
          {[["Appearance","appearance","How others see your character…"],["Personality","personality","First impressions, notable habits…"],["History","history","Background before adventuring…"]].map(([label,key,ph])=>(
            <div key={key} style={{marginTop:16}}>
              <Lbl>{label}</Lbl>
              <textarea style={{...inp,height:70,resize:"vertical"}} value={char[key]||""} onChange={e=>setC(key,e.target.value)} placeholder={ph}/>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function StepBoon({char,setC}){
  return(
    <div>
      <ST>Starting Boon</ST>
      <p style={sub}>Every character receives one starting boon. Choose carefully — it shapes your entire career.</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:20}}>
        {BOONS.map(b=>{
          const sel=char.boon?.name===b.name;
          return(
            <button key={b.name} onClick={()=>setC("boon",b)} style={{border:sel?"1px solid #c8a84a":"1px solid var(--border-cebee8)",background:sel?"var(--bg-sel)":"var(--bg-sel-unsel)",color:"inherit",padding:"16px",cursor:"pointer",textAlign:"left",fontFamily:"inherit",borderRadius:3,transition:"all 0.2s"}}>

            </button>

function StepAttributes({char,setChar,stLeft,apLeft,totalAP,trainBonuses,derived}){
  const isGigantic = char.boon?.name==="Gigantic";
  // Gigantic: STR & VIG start at d6 and can reach d12+6
  const GIGANTIC_CHAIN = ["d4","d6","d8","d10","d12","d12+1","d12+2","d12+3","d12+4","d12+5","d12+6"];
  const statChainFor = (stat) => (isGigantic && (stat==="Strength"||stat==="Vigor")) ? GIGANTIC_CHAIN : STAT_CHAIN;
  const minDieFor    = (stat) => (isGigantic && (stat==="Strength"||stat==="Vigor")) ? 1 : 0; // index 1 = d6

  const updStat=(stat,dir)=>setChar(c=>{
    const chain = statChainFor(stat);
    const cur=chain.indexOf(c.stats[stat]);
    const next=cur+dir;
    const min=minDieFor(stat);
    if(next<min||next>=chain.length)return c;
    const ns={...c.stats,[stat]:chain[next]};
    const freePoints = c.boon?.name==="Gigantic" ? 2 : 0;
    const budget = 6 + (c.levelStatPointsSpent||0);
    if(statPointsUsed(ns) - freePoints > budget) return c;
    return{...c,stats:ns};
  });
  const isVoA = char.boon?.name==="Vow of Ash";
  const isRoE = char.boon?.name==="Rite of Embers";

  const updAttr=(key,val)=>setChar(c=>{
    // Vow of Ash: Mana is permanently locked at 0
    if(key==="Mana" && c.boon?.name==="Vow of Ash") return c;
    // Rite of Embers: Stamina is permanently locked at 10
    if(key==="Stamina" && c.boon?.name==="Rite of Embers") return c;
    const base={HP:20,Stamina:10,Mana:0};
    if(val<base[key])return c;
    const diff=val-c.attrs[key];
    const newUsed=c.attrPointsUsed+diff;
    const boonAP2 = c.boon?.name==="History of Discipline" ? 10 : 0;
    const totalBudget = 20 + boonAP2;
    // attrPointsUsed now tracks both base and level-up spending combined
    const baseOnlyUsed = newUsed - (c.levelAttrPoints !== undefined ? 0 : 0);
    if(newUsed > totalBudget + (c.levelAttrPoints||0)) return c;
    return{...c,attrs:{...c.attrs,[key]:val},attrPointsUsed:newUsed};
  });
  const STAT_DESC={
    Strength:   "Damage for unarmed & weapon attacks. Required to wield heavier weapons. Used in Grab checks.",
    Dexterity:  "Accuracy for attacks. Parry = ½ DEX + 2.",
    Vigor:      "+5 Max HP & +5 Damage Shield cap per tier above d4. Armor = ½ VIG − 2. Resists physical crowd control.",
    Mind:       "Accuracy & damage of attack spells. Spell Range +1 per tier above d4.",
    Willpower:  "Powers CC & save spells. Ward = ½ WIL − 2. Spell Range +1 per tier above d4.",
  };

  return(
    <div>
      <ST>Stats & Attributes</ST>
      {char.boon?.name==="History of Discipline"&&<Banner>History of Discipline: +10 Attribute Points added!</Banner>}
      {isGigantic&&<Banner>Gigantic: STR & VIG start at d6 and can reach d12+6. You occupy a 2×2 space and have Melee Reach +1.</Banner>}
      {isVoA&&<Banner>Vow of Ash: Mana is permanently locked at 0. Cannot invest in Magic Skills or Spellcrafting. Gain an extra mastery perk for Physical skills.</Banner>}
      {isRoE&&<Banner>Rite of Embers: Stamina is permanently locked at 10. Cannot invest in Physical Skills. Gain an extra mastery perk for Magic skills and Spellcrafting.</Banner>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:28,marginTop:20}}>
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{fontSize:12,color:"#c8a84a",letterSpacing:"0.12em"}}>STATS</span>
            <span style={{fontSize:11,color:stLeft<0?"var(--text-danger)":"#6a5a3a"}}>{stLeft} / 6 pts left</span>
          </div>
          {STATS.map(s=>{
            const chain=statChainFor(s);
            const curIdx=chain.indexOf(char.stats[s]);
            const minIdx=minDieFor(s);
            const atCap=curIdx>=chain.length-1;
            const atMin=curIdx<=minIdx;
            return(
            <div key={s} style={{marginBottom:10,padding:"10px 12px",background:"var(--bg-card)",border:"1px solid var(--border-main)",borderRadius:3}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                <span style={{fontSize:12,fontWeight:600,color:"var(--text-body)"}}>
                  {s}
                  {isGigantic&&(s==="Strength"||s==="Vigor")&&<span style={{fontSize:9,color:"#c8a84a",marginLeft:6,letterSpacing:"0.08em"}}>GIGANTIC</span>}
                </span>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <button onClick={()=>updStat(s,-1)} disabled={atMin} style={{...sm,opacity:atMin?0.3:1}}>−</button>
                  <span style={{fontSize:14,color:"#c8a84a",minWidth:50,textAlign:"center",fontWeight:700}}>{char.stats[s]}</span>
                  <button onClick={()=>updStat(s,1)} disabled={atCap} style={{...sm,opacity:atCap?0.3:1}}>+</button>
                </div>
              </div>
              <div style={{fontSize:10,color:"var(--text-sm-btn)"}}>{STAT_DESC[s]}</div>
            </div>
            );
          })}
        </div>
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{fontSize:12,color:"#c8a84a",letterSpacing:"0.12em"}}>ATTRIBUTES</span>
            <span style={{fontSize:11,color:apLeft<0?"var(--text-danger)":"var(--text-pts-ok)"}}>{apLeft} / {totalAP} pts left</span>
          </div>
          <div style={{fontSize:10,color:"var(--text-muted)",marginBottom:10}}>Base: 20 HP / 10 Stamina / 0 Mana. Each point = +1 to one attribute.</div>
          {[
            {key:"HP",label:"Health (HP)",desc:"0 HP = Downed. Wounds reduce max HP by 5."},
            {key:"Stamina",label:"Stamina",desc:isRoE?"🔒 Locked at 10 by Rite of Embers.":"Fuels Techniques. 0 = risk Unconscious."},
            {key:"Mana",label:"Mana",desc:isVoA?"🔒 Locked at 0 by Vow of Ash.":"Fuels Spells. 0 = Manashock risk."},
          ].map(({key,label,desc})=>{
            const locked = (key==="Mana"&&isVoA)||(key==="Stamina"&&isRoE);
            return(
            <div key={key} style={{marginBottom:10,padding:"10px 12px",background:locked?"var(--bg-panel-alt)":"var(--bg-card)",border:`1px solid ${locked?"var(--accent-gold)":"var(--border-cebee8)"}`,borderRadius:3,opacity:locked?0.75:1}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                <span style={{fontSize:12,fontWeight:600,color:"var(--text-body)"}}>
                  {label}
                  {locked&&<span style={{fontSize:9,color:"#c8a84a",marginLeft:6,letterSpacing:"0.08em"}}>LOCKED</span>}
                </span>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <button onClick={()=>updAttr(key,char.attrs[key]-1)} disabled={locked} style={{...sm,opacity:locked?0.3:1}}>−</button>
                  <span style={{fontSize:14,color:locked?"var(--text-label)":"#c8a84a",minWidth:36,textAlign:"center",fontWeight:700}}>{char.attrs[key]}</span>
                  <button onClick={()=>updAttr(key,char.attrs[key]+1)} disabled={locked} style={{...sm,opacity:locked?0.3:1}}>+</button>
                </div>
              </div>
              <div style={{fontSize:10,color:locked?"#c8a84a":"#6a50a0"}}>{desc}</div>
            </div>
            );
          })}
          {/* Derived block */}
          <div style={{marginTop:12,padding:"12px",background:"var(--bg-card)",border:"1px solid var(--border-main)",borderRadius:3}}>
            <div style={{fontSize:10,color:"#c8a84a",letterSpacing:"0.12em",marginBottom:8}}>DERIVED STATS (base — training bonuses apply later)</div>
            {(()=>{
              const sz = char.size||1;
              const szB = calcSizeBonus(sz);
              const reach = 1 + szB.reach;
              const rows = [
                ["Size", sz],
                ["Melee Reach", `${reach} space${reach>1?"s":""}${sz>=2?" (size 2+)":""}`],
                ["Max HP", `${char.attrs.HP + calcVigorHP(char.stats.Vigor)} (${char.attrs.HP} base + ${calcVigorHP(char.stats.Vigor)} Vigor)`],
                ["Dmg Shield Cap", `${calcDmgShield(char.stats.Vigor)} (${vigorTier(char.stats.Vigor)} × 5 Vigor)`],
                ["Primary Dmg bonus", `${szB.primDmg>0?"+":""}${szB.primDmg} from size`],
                ["Parry", `${calcParry(char.stats.Dexterity) + szB.parry} (½ DEX+2${szB.parry!==0?" "+szB.parry+" size":""})`],
                ["Armor", `${calcArmor(char.stats.Vigor) + szB.armor} (½ VIG−2${szB.armor>0?" +"+szB.armor+" size":""})`],
                ["Ward", `${calcWard(char.stats.Willpower)} (½ WIL − 2)`],
                ["Spell Range", `${calcSpellRange(char.stats.Mind,char.stats.Willpower)} (2+${STAT_CHAIN.indexOf(char.stats.Mind)}M+${STAT_CHAIN.indexOf(char.stats.Willpower)}WIL)`],
                ["Carry Cap", `${char.attrs.Stamina} (= Stamina)`],
                ["Tech Slots", `${char.attrs.Stamina} (= Stamina)`],
                ["Spell Slots", `${char.attrs.Mana} (= Mana)`],
              ];
              return rows.map(([k,v])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:4,paddingBottom:4,borderBottom:"1px solid var(--border-row)"}}>
                  <span style={{color:"var(--text-row-label)"}}>{k}</span>
                  <span style={{color:"var(--text-muted)"}}>{v}</span>
                </div>
              ));
            })()}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── STEP SKILLS ─────────────────────────────────────────────────────────────
function StepSkills({char,setChar,spLeft,totalSP,moneyLeft,skillSilverSpent}){
  const [openTree,setOpenTree]=useState(null);
  const isVoA=char.boon?.name==="Vow of Ash";
  const isRoE=char.boon?.name==="Rite of Embers";
  const RANK_LABELS=["None","Novice","Adept","Master"];
  const TIERS=["novice","adept","master"];

  const setRank=(id,rank)=>setChar(c=>{
    const cur=c.skills[id]||0,diff=rank-cur;
    const newUsed=Object.values(c.skills).reduce((t,v)=>t+v,0)+diff;
    const bSP=c.boon?.name==="History of Discipline"?2:0;
    if(newUsed - (c.levelSkillPointsSpent||0) > 3+bSP) return c;
    const tree=SKILL_TREES.find(s=>s.id===id);
    if(isVoA&&tree?.type==="magic"&&rank>0)return c;
    if(isRoE&&tree?.type==="physical"&&rank>0)return c;
    // Strip data from tiers being removed
    const newTechs={...c.techniques};
    const newMPs={...c.masterPerks};
    const newPT=new Set(c.purchasedTrainings);
    if(rank<3){
      delete newMPs[id];
      if(newTechs[id]?.master){const t={...newTechs[id]};delete t.master;newTechs[id]=t;}
      newPT.delete(`${id}:master`);
    }
    if(rank<2){
      if(newTechs[id]?.adept){const t={...newTechs[id]};delete t.adept;newTechs[id]=t;}
      newPT.delete(`${id}:adept`);
    }
    if(rank<1){
      delete newTechs[id];
      newPT.delete(`${id}:novice`);
    }
    return{...c,skills:{...c.skills,[id]:rank},techniques:newTechs,masterPerks:newMPs,purchasedTrainings:newPT};
  });

  // Which skill tree (if any) currently owns the training line? (separate for physical/magic)
  const physicalTrainingTreeId = (() => {
    for(const tree of SKILL_TREES.filter(t=>t.type==="physical")) {
      const tiers = ["novice","adept","master"];
      if(tiers.some(t => char.purchasedTrainings.has(`${tree.id}:${t}`))) return tree.id;
    }
    return null;
  })();
  const magicTrainingTreeId = (() => {
    for(const tree of SKILL_TREES.filter(t=>t.type==="magic")) {
      const tiers = ["novice","adept","master"];
      if(tiers.some(t => char.purchasedTrainings.has(`${tree.id}:${t}`))) return tree.id;
    }
    return null;
  })();
  const trainingTreeId = physicalTrainingTreeId || magicTrainingTreeId;

  const toggleTraining=(skillId,tier)=>setChar(c=>{
    const key=`${skillId}:${tier}`;
    const silverCost=TIER_SILVER[tier];
    const already=c.purchasedTrainings.has(key);
    // Block if this tree has no training for this tier
    const thisTreeDef=SKILL_TREES.find(t=>t.id===skillId);
    if(!already && !thisTreeDef?.tiers[tier]?.training) return c;
    if(!already){
      // Block if a DIFFERENT tree of the SAME TYPE already owns the training line
      const tiers2=["novice","adept","master"];
      const thisTree=SKILL_TREES.find(t=>t.id===skillId);
      const ownerTree=SKILL_TREES.find(t=>t.id!==skillId&&t.type===thisTree?.type&&tiers2.some(ti=>c.purchasedTrainings.has(`${t.id}:${ti}`)));
      if(ownerTree)return c;
      // Check silver
      const addonCost=(()=>{let t=0;if(c.weaponRune){const r=WEAPON_RUNES_DATA.find(x=>x.name===c.weaponRune);if(r&&!r.special)t+=r.cost;}if(c.weaponSpell){const s=WEAPON_SPELLS_DATA.find(x=>x.name===c.weaponSpell);if(s)t+=s.cost;}if(c.weaponMithril&&c.equipment.weapon)t+=MITHRIL_WEAPON_COST(getWeaponHandedness(c.equipment.weapon));for(const m of(c.weaponMods||[])){const md=GUN_MODS_DATA.find(x=>x.name===m);if(md)t+=md.cost;}return t;})(); const equipSpent=[c.equipment.weapon?.cost||0,c.equipment.offhand?.cost||0,c.equipment.armor?.cost||0,c.equipment.catalyst?.cost||0,...c.equipment.items.map(i=>i.cost),...c.equipment.jewelry.map(j=>j.cost),addonCost].reduce((a,b)=>a+b,0);
      const currentSkillSpent=calcSkillSilverSpent(c.skills,c.purchasedTrainings,c.techniques);
      if(equipSpent+currentSkillSpent+silverCost>c.money)return c;
    }
    const newPT=new Set(c.purchasedTrainings);
    already?newPT.delete(key):newPT.add(key);
    return{...c,purchasedTrainings:newPT};
  });

  const toggleTechnique=(skillId,tier,techName)=>setChar(c=>{
    const cur=((c.techniques[skillId]||{})[tier])||[];
    const exists=cur.includes(techName);
    const silverCost=TIER_SILVER[tier];
    if(!exists){
      const addonCost=(()=>{let t=0;if(c.weaponRune){const r=WEAPON_RUNES_DATA.find(x=>x.name===c.weaponRune);if(r&&!r.special)t+=r.cost;}if(c.weaponSpell){const s=WEAPON_SPELLS_DATA.find(x=>x.name===c.weaponSpell);if(s)t+=s.cost;}if(c.weaponMithril&&c.equipment.weapon)t+=MITHRIL_WEAPON_COST(getWeaponHandedness(c.equipment.weapon));for(const m of(c.weaponMods||[])){const md=GUN_MODS_DATA.find(x=>x.name===m);if(md)t+=md.cost;}return t;})(); const equipSpent=[c.equipment.weapon?.cost||0,c.equipment.offhand?.cost||0,c.equipment.armor?.cost||0,c.equipment.catalyst?.cost||0,...c.equipment.items.map(i=>i.cost),...c.equipment.jewelry.map(j=>j.cost),addonCost].reduce((a,b)=>a+b,0);
      const currentSkillSpent=calcSkillSilverSpent(c.skills,c.purchasedTrainings,c.techniques);
      if(equipSpent+currentSkillSpent+silverCost>c.money)return c;
    }
    return{...c,techniques:{...c.techniques,[skillId]:{...(c.techniques[skillId]||{}),[tier]:exists?cur.filter(n=>n!==techName):[...cur,techName]}}};
  });

  const maxPerksFor = (tree) => {
    const isPhys = tree.type==="physical";
    const isMag  = tree.type==="magic";
    if(isVoA && isPhys) return 2;
    if(isRoE && isMag)  return 2;
    return 1;
  };

  // masterPerks stored as {skillId: [perk1, perk2?]}
  const getPerks = (skillId) => {
    const val = char.masterPerks[skillId];
    if(!val) return [];
    if(Array.isArray(val)) return val;
    return [val]; // migrate old string format
  };

  const setMasterPerk = (skillId, perkName, slotIndex) => setChar(c => {
    const tree = SKILL_TREES.find(t=>t.id===skillId);
    const cur = Array.isArray(c.masterPerks[skillId]) ? c.masterPerks[skillId] : c.masterPerks[skillId] ? [c.masterPerks[skillId]] : [];
    let next = [...cur];
    const isDeselect = next[slotIndex] === perkName;

    // Handle auto-spells: remove old perk's auto-spell if it had one
    let newTechs = {...c.techniques};
    let newSlottedSpells = new Set(c.slottedSpells||[]);
    const oldPerkName = next[slotIndex];
    if(oldPerkName && tree) {
      const oldPerkDef = (tree.masterPerks||[]).find(p=>p.name===oldPerkName);
      if(oldPerkDef?.autoSpell) {
        const {tier:aTier, name:aName} = oldPerkDef.autoSpell;
        const tierSpells = ((newTechs[skillId]||{})[aTier]||[]).filter(s=>s!==aName);
        newTechs = {...newTechs, [skillId]:{...(newTechs[skillId]||{}), [aTier]:tierSpells}};
        newSlottedSpells.delete(`${skillId}||${aName}`);
      }
    }

    if(isDeselect) {
      next[slotIndex] = undefined;
    } else {
      next[slotIndex] = perkName;
      // Add new perk's auto-spell if it has one
      if(tree) {
        const newPerkDef = (tree.masterPerks||[]).find(p=>p.name===perkName);
        if(newPerkDef?.autoSpell) {
          const {tier:aTier, name:aName} = newPerkDef.autoSpell;
          const existing = (newTechs[skillId]||{})[aTier]||[];
          if(!existing.includes(aName)) {
            newTechs = {...newTechs, [skillId]:{...(newTechs[skillId]||{}), [aTier]:[...existing, aName]}};
          }
          newSlottedSpells.add(`${skillId}||${aName}`);
        }
      }
    }

    // remove undefined trailing entries
    while(next.length && !next[next.length-1]) next.pop();
    return {...c, masterPerks:{...c.masterPerks,[skillId]:next}, techniques:newTechs, slottedSpells:newSlottedSpells};
  });

  const phys=SKILL_TREES.filter(s=>s.type==="physical");
  const magic=SKILL_TREES.filter(s=>s.type==="magic");

  return(
    <div>
      <ST>Skill Trees & Techniques</ST>
      {/* Budget bar */}
      <div style={{display:"flex",gap:10,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{padding:"6px 12px",background:"var(--bg-card)",border:"1px solid var(--border-main)",borderRadius:3,fontSize:11}}>
          🎯 <span style={{color:"#c8a84a",fontWeight:700}}>{spLeft}</span> / {totalSP} Skill Points
        </div>
        <div style={{padding:"6px 12px",background:"var(--bg-card)",border:moneyLeft<0?"1px solid var(--text-danger)":"1px solid var(--border-cebee8)",borderRadius:3,fontSize:11}}>
          💰 <span style={{color:moneyLeft<0?"#c05040":"#c8a84a",fontWeight:700}}>{moneyLeft}</span> Silver left
          {skillSilverSpent>0&&<span style={{color:"var(--text-row-label)",marginLeft:6}}>(spent {skillSilverSpent}s on skills)</span>}
        </div>
        <span style={{fontSize:10,color:"var(--text-sm-btn)"}}>Novice=50s · Adept=100s · Master=150s per training or technique</span>
      </div>
      {isVoA&&<Banner>Vow of Ash: Cannot invest in Magic skills.</Banner>}
      {isRoE&&<Banner>Rite of Embers: Cannot invest in Physical skills.</Banner>}
      {physicalTrainingTreeId&&<Banner style={{borderColor:"#4a9a30",background:"var(--bg-panel-alt)",color:"var(--text-teal)"}}>Physical training locked to: <strong>{SKILL_TREES.find(t=>t.id===physicalTrainingTreeId)?.name}</strong>. Refund its trainings to switch.</Banner>}
      {magicTrainingTreeId&&<Banner style={{borderColor:"#7060b0",background:"var(--bg-panel-alt)",color:"#a080e0"}}>Magic training locked to: <strong>{SKILL_TREES.find(t=>t.id===magicTrainingTreeId)?.name}</strong>. Refund its trainings to switch. Spells in other trees are still accessible via skill rank.</Banner>}

      {[["Physical Skills",phys],["Magic Skills",magic]].map(([title,trees])=>(
        <div key={title} style={{marginTop:18}}>
          <div style={{fontSize:11,color:"#c8a84a",letterSpacing:"0.15em",marginBottom:8}}>{title.toUpperCase()}</div>
          {trees.map(tree=>{
            const rank=char.skills[tree.id]||0;
            const locked=(isVoA&&tree.type==="magic")||(isRoE&&tree.type==="physical");
            const isOpen=openTree===tree.id;
            return(
              <div key={tree.id} style={{marginBottom:8,border:rank>0?"1px solid var(--border-main)":"1px solid var(--border-soft)",borderRadius:3,background:"var(--bg-skill-row)",opacity:locked?0.4:1}}>
                {/* Tree header */}
                <div style={{padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:13,fontWeight:600,color:rank>0?"#c8a84a":"var(--text-nav-lock)"}}>{tree.name}</span>
                      <span style={{fontSize:10,color:rank>0?"#c8a84a":"var(--text-nav-lock)",padding:"1px 6px",background:"var(--bg-tag)",borderRadius:3}}>{RANK_LABELS[rank]}</span>
                    </div>
                    <div style={{fontSize:10,color:"var(--text-muted)",marginTop:2}}>{tree.desc}</div>
                  </div>
                  {/* Rank buttons (skill point cost shown) */}
                  <div style={{display:"flex",gap:3}}>
                    {[0,1,2,3].map(r=>(
                      <button key={r} onClick={()=>!locked&&setRank(tree.id,r)} style={{
                        padding:"3px 8px",border:"none",cursor:locked?"default":"pointer",
                        background:rank>=r&&r>0?"var(--bg-pip-on)":"var(--bg-pip-off)",
                        color:rank>=r&&r>0?"var(--text-pip-on)":"var(--text-pip-off)",
                        fontSize:9,fontFamily:"inherit",borderRadius:3,
                      }}>{RANK_LABELS[r]}{r>0?` (${r}pt)`:""}</button>
                    ))}
                  </div>
                  {rank>0&&(
                    <button onClick={()=>setOpenTree(isOpen?null:tree.id)} style={{padding:"4px 10px",border:"1px solid var(--border-main)",background:"transparent",color:"var(--text-row-label)",cursor:"pointer",fontSize:10,fontFamily:"inherit",borderRadius:3,whiteSpace:"nowrap"}}>
                      {isOpen?"▲ Hide":"▼ Buy"}
                    </button>
                  )}
                </div>

                {/* Expanded pane */}
                {isOpen&&rank>0&&(
                  <div style={{borderTop:"1px solid var(--border-light)",padding:"14px"}}>
                    {TIERS.map((tier,ti)=>{
                      if(rank<ti+1)return null;
                      const tierData=tree.tiers[tier];
                      const selTechs=((char.techniques[tree.id]||{})[tier])||[];
                      const training=tierData.training;
                      const techniques=tierData.techniques;
                      const trainingKey=`${tree.id}:${tier}`;
                      const trainingBought=char.purchasedTrainings.has(trainingKey);
                      const sameTypeTrainingTreeId = tree.type==="magic" ? magicTrainingTreeId : physicalTrainingTreeId;
                      const trainingLocked=!trainingBought&&sameTypeTrainingTreeId!==null&&sameTypeTrainingTreeId!==tree.id;
                      const silverCost=TIER_SILVER[tier];
                      return(
                        <div key={tier} style={{marginBottom:18}}>
                          {/* Tier label */}
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                            <span style={{fontSize:10,color:"#c8a84a",letterSpacing:"0.1em"}}>{tier.toUpperCase()} TIER</span>
                            <span style={{fontSize:9,color:"var(--text-row-label)"}}>— each item costs {silverCost}s</span>
                          </div>

                          {/* Training — purchasable, locked if another tree owns the training line */}
                          {training&&(<button onClick={()=>!trainingLocked&&toggleTraining(tree.id,tier)} style={{
                            width:"100%",
                            border:trainingBought?"1px solid var(--accent-gold)":"1px solid var(--border-cebee8)",
                            background:trainingBought?"var(--training-bought)":trainingLocked?"var(--training-locked)":"var(--bg-panel)",
                            color:"inherit",padding:"9px 12px",
                            cursor:trainingLocked?"not-allowed":"pointer",
                            textAlign:"left",fontFamily:"inherit",borderRadius:3,marginBottom:8,
                            display:"flex",alignItems:"flex-start",gap:8,
                            opacity:trainingLocked?0.4:1,
                          }}>
                            <span style={{fontSize:10,color:trainingBought?"var(--text-train-bought)":trainingLocked?"var(--text-train-locked)":"var(--text-train-norm)",whiteSpace:"nowrap",marginTop:1}}>⚡ TRAINING</span>
                            <div style={{flex:1}}>
                              <span style={{fontSize:11,color:trainingBought?"var(--text-train-bought)":trainingLocked?"var(--text-head)":"var(--text-sub)",fontWeight:600}}>{training.name}</span>
                              <span style={{fontSize:10,color:trainingBought?"var(--text-train-bought)":trainingLocked?"var(--text-train-locked)":"var(--text-train-norm)",marginLeft:6}}>{training.desc}</span>
                            </div>
                            <span style={{fontSize:10,color:trainingBought?"var(--text-train-bought)":trainingLocked?"var(--text-train-locked)":"var(--text-train-norm)",whiteSpace:"nowrap",marginLeft:8}}>
                              {trainingBought?"✓ Purchased":trainingLocked?"🔒 Locked":`${silverCost}s`}
                            </span>
                          </button>)}

                          {/* Techniques / Spells */}
                          {tree.type==="magic"&&training&&!trainingBought&&techniques.length>0&&(
                            <div style={{fontSize:10,color:"#a080e0",marginBottom:6,padding:"4px 8px",background:"rgba(112,80,180,0.1)",borderRadius:3,border:"1px solid rgba(112,80,180,0.25)"}}>
                              ✦ Spells are accessible via skill rank. Training is optional — each tier purchased adds +5 Mana spell slots.
                            </div>
                          )}
                          {techniques.length>0&&(
                            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                              {techniques.map(tech=>{
                                const sel=selTechs.includes(tech.name);
                                return(
                                  <button key={tech.name} onClick={()=>toggleTechnique(tree.id,tier,tech.name)} style={{
                                    border:sel?"1px solid #c8a84a":"1px solid var(--border-soft)",
                                    background:sel?"var(--bg-sel)":"var(--bg-panel)",
                                    color:"inherit",padding:"8px 10px",cursor:"pointer",
                                    textAlign:"left",fontFamily:"inherit",borderRadius:3,
                                  }}>
                                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:3}}>
                                      <span style={{fontSize:11,fontWeight:600,color:sel?"var(--text-value-hi)":"var(--text-body)"}}>{tech.name}</span>
                                      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2,marginLeft:4,flexShrink:0}}>
                                        <span style={{fontSize:9,color:sel?"var(--accent-gold)":"var(--text-muted)"}}>{sel?"✓":silverCost+"s"}</span>
                                        <span style={{fontSize:8,color:"var(--text-sm-btn)"}}>{tech.cost}</span>
                                      </div>
                                    </div>
                                    <div style={{fontSize:10,color:sel?"var(--text-label)":"var(--text-desc)",lineHeight:1.4}}>{tech.desc}</div>
                                  </button>
                                );
                              })}
                            </div>
                          )}

                          {/* Master Perks */}
                          {tier==="master"&&tree.masterPerks&&(
                            <div style={{marginTop:10}}>
                              {Array.from({length:maxPerksFor(tree)}).map((_,slotIdx)=>{
                                const perks = getPerks(tree.id);
                                const chosenThisSlot = perks[slotIdx];
                                const otherSlotPerk = perks[slotIdx===0?1:0];
                                const isBonus = slotIdx===1;
                                return(
                                  <div key={slotIdx} style={{marginBottom:slotIdx===0?10:0}}>
                                    <div style={{fontSize:10,color:isBonus?"#8b1a2a":"#c8a84a",letterSpacing:"0.1em",marginBottom:6}}>
                                      {isBonus?"★ BONUS PERK (Boon) — choose one":"★ MASTER PERK — choose one (free)"}
                                    </div>
                                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                                      {tree.masterPerks.map(p=>{
                                        const sel = chosenThisSlot===p.name;
                                        // grey out if chosen in the other slot
                                        const takenOther = otherSlotPerk===p.name;
                                        return(
                                          <button key={p.name} onClick={()=>!takenOther&&setMasterPerk(tree.id,p.name,slotIdx)} style={{
                                            border:sel?"1px solid var(--accent-gold)":takenOther?"1px solid var(--border-soft)":"1px solid var(--border-cebee8)",
                                            background:sel?"var(--bg-tbl-sel)":takenOther?"var(--bg-panel-alt)":"var(--bg-card)",
                                            color:"inherit",padding:"8px 10px",
                                            cursor:takenOther?"default":"pointer",
                                            textAlign:"left",fontFamily:"inherit",borderRadius:3,
                                            opacity:takenOther?0.4:1,
                                          }}>
                                            <div style={{fontSize:11,fontWeight:700,color:sel?"#d4a030":"var(--text-sub)",marginBottom:4}}>{p.name}</div>
                                            <div style={{fontSize:10,color:sel?"var(--text-label)":"var(--text-desc)",lineHeight:1.4}}>{p.desc}</div>
                                          </button>
                                        );
                                      })}
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// ─── STEP EQUIPMENT ──────────────────────────────────────────────────────────
function StepEquipment({char,setChar,moneyLeft}){
  const [tab,setTab]=useState("weapons");
  const [enchSlot,setEnchSlot]=useState("main"); // "main" or "offhand"
  const setEq=(key,val)=>setChar(c=>{
    // When changing weapon, clear add-ons that may not apply to new weapon
    if(key==="weapon") {
      const newIsGun = val && (val.props||"").includes("Gun");
      const wasGun = c.equipment.weapon && (c.equipment.weapon.props||"").includes("Gun");
      if(newIsGun !== wasGun || !val) {
        return {...c, equipment:{...c.equipment,[key]:val}, weaponRune:null, weaponSpell:null, weaponMithril:false, weaponMods:[]};
      }
      if(newIsGun && val) {
        const newMax = val.name==="Lasgun"?1:["Pistol","Musket","Boomstick","Autogun"].includes(val.name)?1:2;
        const filteredMods = (c.weaponMods||[])
          .filter(m=>val.name!=="Lasgun"||LASGUN_MOD_WHITELIST.includes(m))
          .slice(0,newMax);
        return {...c, equipment:{...c.equipment,[key]:val}, weaponMods:filteredMods};
      }
    }
    if(key==="offhand") {
      const newIsGun = val && (val.props||"").includes("Gun");
      const wasGun = c.equipment.offhand && (c.equipment.offhand.props||"").includes("Gun");
      if(newIsGun !== wasGun || !val) {
        return {...c, equipment:{...c.equipment,[key]:val}, offhandRune:null, offhandSpell:null, offhandMithril:false, offhandMods:[]};
      }
      if(newIsGun && val) {
        const newMax = val.name==="Lasgun"?1:["Pistol","Musket","Boomstick","Autogun"].includes(val.name)?1:2;
        const filteredMods = (c.offhandMods||[])
          .filter(m=>val.name!=="Lasgun"||LASGUN_MOD_WHITELIST.includes(m))
          .slice(0,newMax);
        return {...c, equipment:{...c.equipment,[key]:val}, offhandMods:filteredMods};
      }
    }
    return {...c, equipment:{...c.equipment,[key]:val}};
  });
  const toggleList=(list,item)=>setChar(c=>{
    const exists=c.equipment[list].find(i=>i.name===item.name);
    return{...c,equipment:{...c.equipment,[list]:exists?c.equipment[list].filter(i=>i.name!==item.name):[...c.equipment[list],item]}};
  });
  const TABS=["weapons","armor","catalysts","jewelry","alchemical","enchantments"];

  return(
    <div>
      <ST>Equipment</ST>
      <div style={{display:"flex",gap:12,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{padding:"8px 14px",background:"var(--bg-card)",border:"1px solid var(--border-main)",borderRadius:3,fontSize:12}}>
          💰 <span style={{color:"#c8a84a",fontWeight:700}}>{moneyLeft}</span> Silver remaining
        </div>
        <div style={{padding:"8px 14px",background:"var(--bg-card)",border:"1px solid var(--border-main)",borderRadius:3,fontSize:12}}>
          {char.equipment.weapon?"🗡 "+char.equipment.weapon.name:"No weapon selected"}
        </div>
        <div style={{padding:"8px 14px",background:"var(--bg-card)",border:"1px solid var(--border-main)",borderRadius:3,fontSize:12}}>
          {char.equipment.armor?"🛡 "+char.equipment.armor.name:"No armor"}
        </div>
      </div>
      <div style={{display:"flex",gap:0,marginBottom:16,borderBottom:"1px solid var(--border-light)"}}>
        {TABS.map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{padding:"7px 12px",border:"none",cursor:"pointer",background:"transparent",borderBottom:tab===t?"1px solid #c8a84a":"2px solid transparent",color:tab===t?"var(--accent-gold)":"var(--text-muted)",fontSize:11,fontFamily:"inherit",textTransform:"capitalize"}}>
            {t}
          </button>
        ))}
      </div>

      {tab==="weapons"&&(
        <div>
          {Object.entries(WEAPONS_DATA).map(([cat,items])=>(
            <div key={cat} style={{marginBottom:20}}>
              <div style={{fontSize:10,color:"var(--text-row-label)",letterSpacing:"0.12em",marginBottom:6}}>{cat.toUpperCase()}</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
                <thead><tr style={{color:"var(--text-muted)",borderBottom:"1px solid var(--border-light)"}}>
                  {["Name","Damage","AP","Properties","Min STR","Wt","Cost",""].map(h=><th key={h} style={thS}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {items.map(w=>{
                    const isMW=char.equipment.weapon?.name===w.name;
                    const isOH=char.equipment.offhand?.name===w.name;
                    return(
                      <tr key={w.name} style={{borderBottom:"1px solid var(--border-row)",background:isMW||isOH?"rgba(76,200,224,0.08)":"transparent"}}>
                        <td style={tdS}>{w.name}</td>
                        <td style={{...tdS,color:"#c8a84a"}}>{(()=>{const c=w.props?.match(/Cloak\((\d+ft)\)/);return c?`${w.dmg} (Cloak ${c[1]})`:w.dmg;})()}</td>
                        <td style={{...tdS,color:"#4cc8e0",fontWeight:600}}>{(()=>{const m=w.props?.match(/\bAP (\d+)/);return m?m[1]:"—";})()}</td>
                        <td style={{...tdS,color:"var(--text-row-label)"}}>{w.props}</td>
                        <td style={tdS}>{w.minStr}</td>
                        <td style={tdS}>{w.wt}</td>
                        <td style={tdS}>{w.cost}s</td>
                        <td style={tdS}>
                          <div style={{display:"flex",gap:3}}>
                            <button onClick={()=>setEq("weapon",isMW?null:w)} style={{...mic,background:isMW?"var(--bg-sel)":"transparent",color:isMW?"#c9a84c":"var(--text-td)"}}>Main</button>
                            <button onClick={()=>setEq("offhand",isOH?null:w)} style={{...mic,background:isOH?"var(--bg-sel)":"transparent",color:isOH?"#c9a84c":"var(--text-td)"}}>Off</button>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          ))}
        </div>
      )}
      {tab==="armor"&&(
        <div>
          <div style={{fontSize:10,color:"var(--text-row-label)",letterSpacing:"0.12em",marginBottom:6}}>ARMOR</div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:10,marginBottom:16}}>
            <thead><tr style={{color:"var(--text-muted)",borderBottom:"1px solid var(--border-light)"}}>
              {["Name","Bonus","Type","Min STR","Wt","Cost",""].map(h=><th key={h} style={thS}>{h}</th>)}
            </tr></thead>
            <tbody>{ARMORS_DATA.map(a=>{
              const sel=char.equipment.armor?.name===a.name;
              return(<tr key={a.name} style={{borderBottom:"1px solid var(--border-row)",background:sel?"var(--bg-tbl-row-hi)":"transparent"}}>
                <td style={tdS}>{a.name}</td>
                <td style={{...tdS,color:"#c8a84a"}}>{a.bonus}</td>
                <td style={{...tdS,color:"var(--text-row-label)"}}>{a.type}</td>
                <td style={tdS}>{a.minStr}</td>
                <td style={tdS}>{a.wt}</td>
                <td style={tdS}>{a.cost}s</td>
                <td style={tdS}><button onClick={()=>setEq("armor",sel?null:a)} style={{...mic,background:sel?"var(--bg-sel)":"transparent",color:sel?"#c9a84c":"var(--text-td)"}}>{sel?"Equipped":"Equip"}</button></td>
              </tr>);
            })}</tbody>
          </table>
          <div style={{fontSize:10,color:"var(--text-row-label)",letterSpacing:"0.12em",marginBottom:6}}>SHIELDS</div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
            <thead><tr style={{color:"var(--text-muted)",borderBottom:"1px solid var(--border-light)"}}>
              {["Name","Bonus","Min STR","Wt","Cost",""].map(h=><th key={h} style={thS}>{h}</th>)}
            </tr></thead>
            <tbody>{SHIELDS_DATA.map(s=>{
              const sel=char.equipment.offhand?.name===s.name;
              return(<tr key={s.name} style={{borderBottom:"1px solid var(--border-row)",background:sel?"var(--bg-tbl-row-hi)":"transparent"}}>
                <td style={tdS}>{s.name}</td>
                <td style={{...tdS,color:"#c8a84a"}}>{s.bonus}</td>
                <td style={tdS}>{s.minStr}</td>
                <td style={tdS}>{s.wt}</td>
                <td style={tdS}>{s.cost}s</td>
                <td style={tdS}><button onClick={()=>setEq("offhand",sel?null:s)} style={{...mic,background:sel?"var(--bg-sel)":"transparent",color:sel?"#c9a84c":"var(--text-td)"}}>{sel?"Equipped":"Equip"}</button></td>
              </tr>);
            })}</tbody>
          </table>
        </div>
      )}
      {tab==="catalysts"&&(
        <div>
          <p style={{...sub,marginBottom:10}}>Require Spellcrafting or relevant magic skill.</p>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
            <thead><tr style={{color:"var(--text-muted)",borderBottom:"1px solid var(--border-light)"}}>
              {["Name","Damage","AP","Properties","Min Mind","Cost",""].map(h=><th key={h} style={thS}>{h}</th>)}
            </tr></thead>
            <tbody>{CATALYSTS_DATA.map(c=>{
              const sel=char.equipment.catalyst?.name===c.name;
              return(<tr key={c.name} style={{borderBottom:"1px solid var(--border-row)",background:sel?"var(--bg-tbl-row-hi)":"transparent"}}>
                <td style={tdS}>{c.name}</td>
                <td style={{...tdS,color:"#c8a84a"}}>{(()=>{const cl=c.props?.match(/Cloak\((\d+ft)\)/);return cl?`${c.dmg} (Cloak ${cl[1]})`:c.dmg;})()}</td>
                <td style={{...tdS,color:"#4cc8e0",fontWeight:600}}>{(()=>{const m=c.props?.match(/\bAP (\d+)/);return m?m[1]:"—";})()}</td>
                <td style={{...tdS,color:"var(--text-row-label)"}}>{c.props}</td>
                <td style={tdS}>{c.minMind}</td>
                <td style={tdS}>{c.cost}s</td>
                <td style={tdS}><button onClick={()=>setEq("catalyst",sel?null:c)} style={{...mic,background:sel?"var(--bg-sel)":"transparent",color:sel?"#c9a84c":"var(--text-td)"}}>{sel?"Equipped":"Equip"}</button></td>
              </tr>);
            })}</tbody>
          </table>
        </div>
      )}
      {tab==="jewelry"&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {JEWELRY_DATA.map(j=>{
            const sel=char.equipment.jewelry.find(x=>x.name===j.name);
            return(<button key={j.name} onClick={()=>toggleList("jewelry",j)} style={{border:sel?"1px solid #c8a84a":"1px solid var(--border-cebee8)",background:sel?"var(--bg-sel)":"var(--bg-sel-unsel)",color:"inherit",padding:"14px",cursor:"pointer",textAlign:"left",fontFamily:"inherit",borderRadius:3}}>
              <div style={{fontWeight:600,color:sel?"#c9a84c":"#3a2a5a",marginBottom:4}}>{j.name}</div>
              <div style={{fontSize:10,color:sel?"#c8b898":"#4a6a4a"}}>{j.bonus} — {j.cost}s</div>
            </button>);
          })}
        </div>
      )}
      {tab==="alchemical"&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {ALCHEMICAL_DATA.map(a=>{
            const sel=char.equipment.items.find(x=>x.name===a.name);
            return(<button key={a.name} onClick={()=>toggleList("items",a)} style={{border:sel?"1px solid #c8a84a":"1px solid var(--border-cebee8)",background:sel?"var(--bg-sel)":"var(--bg-sel-unsel)",color:"inherit",padding:"14px",cursor:"pointer",textAlign:"left",fontFamily:"inherit",borderRadius:3}}>
              <div style={{fontWeight:600,color:sel?"#c9a84c":"#3a2a5a",marginBottom:4}}>{a.name}</div>
              <div style={{fontSize:10,color:sel?"#c8b898":"#4a6a4a"}}>{a.desc} — {a.cost}s</div>
            </button>);
          })}
        </div>
      )}
      {tab==="enchantments"&&(()=>{
